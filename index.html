<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Blackpink Money - Supabase Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bp-pink: rgb(232, 142, 163); --bp-black: #000; --bp-dark-gray: #121212; --pink-light: #ffb6c1; --text-dim: #999; --asset-pink: #e83e8c; }
        body { padding: 15px; background-color: var(--bp-black); color: #fff; font-family: 'Pretendard', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .container { max-width: 500px; background: var(--bp-dark-gray); padding: 20px; border-radius: 28px; border: 1px solid rgba(232, 142, 163, 0.2); margin-bottom: 30px; margin-left: auto; margin-right: auto; }
        
        /* Navigation */
        .nav-pills { background: #000; border-radius: 16px; padding: 4px; margin-bottom: 20px !important; display: flex; }
        .nav-pills .nav-link { border-radius: 12px; font-weight: 800; color: var(--bp-pink); font-size: 0.62rem; flex: 1; padding: 12px 2px; border: none; background: transparent; transition: 0.3s; }
        .nav-pills .nav-link.active { background-color: var(--bp-pink) !important; color: #000 !important; font-weight: 900; }
        
        /* Form UI */
        .form-control, .form-select { background-color: #0a0a0a !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 14px; padding: 12px; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus { border-color: var(--bp-pink) !important; box-shadow: none !important; outline: none; }

        /* Buttons */
        .btn-pink { width: 100%; padding: 16px; font-weight: 800; border-radius: 16px; border: none !important; background-color: var(--bp-pink) !important; color: #000 !important; font-size: 1rem; box-shadow: 0 4px 15px rgba(232, 142, 163, 0.2); margin-bottom: 20px; display: block; }
        .btn-edit-save { background: var(--bp-pink) !important; color: #000 !important; flex: 1; border-radius: 12px; font-weight: 900; font-size: 0.75rem; padding: 10px; border: none !important; cursor: pointer; }
        .btn-edit-cancel { background: #333 !important; color: #fff !important; flex: 1; border-radius: 12px; font-weight: 900; font-size: 0.75rem; padding: 10px; border: none !important; cursor: pointer; }

        /* Filter Capsule */
        .slim-filter { background: #000; border-radius: 20px; padding: 6px 10px; margin-bottom: 15px; border: 1px solid #333; display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; overflow: hidden; }
        .slim-filter input[type="date"], .slim-filter input[type="month"] { background: #111 !important; border: 1px solid #444 !important; color: var(--bp-pink) !important; border-radius: 10px; padding: 6px 4px; font-size: 0.65rem; flex: 1; min-width: 0; text-align: center; outline: none; }
        .btn-query { background: var(--bp-pink) !important; color: #000 !important; border: none; border-radius: 12px; padding: 0 12px; font-weight: 900; font-size: 0.7rem; height: 34px; flex-shrink: 0; }

        .pure-toggle-btn { background: #222; color: #666; border: 1px solid #333; border-radius: 10px; padding: 0 8px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 900; cursor: pointer; transition: 0.2s; flex-shrink: 0; white-space: nowrap; }
        #in-pure-only { display: none; }
        #in-pure-only:checked + .pure-toggle-btn { background: var(--bp-pink); color: #000; border-color: var(--bp-pink); box-shadow: 0 0 10px rgba(232, 142, 163, 0.4); }

        .total-summary-row { text-align: right; padding: 0 8px 12px 0; font-size: 0.75rem; font-weight: 900; color: var(--bp-pink); letter-spacing: 0.5px; }
        .live-balance-box { font-size: 0.7rem; font-weight: 900; color: var(--bp-pink); text-align: right; margin-top: 4px; min-height: 1rem; }

        /* Cards */
        .custom-card { position: relative; background: var(--bp-black); border-radius: 20px; padding: 18px; border-left: 5px solid var(--bp-pink); border-top: 1px solid #222; border-right: 1px solid #222; border-bottom: 1px solid #222; margin-bottom: 12px; transition: transform 0.3s ease; overflow: hidden; }
        .label-mini { font-size: 0.6rem; color: var(--text-dim) !important; font-weight: 800; margin-bottom: 1px; }
        .val-text { font-size: 0.85rem; font-weight: 700; color: #fff !important; min-height: 18px; }
        .val-amt { font-size: 1.15rem; font-weight: 900; color: var(--pink-light) !important; }
        .card-balance-badge { font-weight: 800; font-size: 0.65rem; color: var(--bp-pink) !important; opacity: 0.9; margin-top: 4px; text-align: right; display: block; }
        .card-note-area { font-size: 0.72rem; color: #aaa !important; border-top: 1px solid #222; margin-top: 8px; padding-top: 8px; font-weight: 500; }
        .tr-row-wrap { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #222; margin-top: 8px; padding: 10px 0 0 0; gap: 4px; }
        .tr-col { flex: 1; min-width: 0; }
        .tr-amt-col { flex: 1; text-align: center; min-width: 0; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card-full { grid-column: span 2; }

        /* Edit Mode */
        .edit-input-box { display: none; margin-top: 5px; }
        .edit-mode .val-text, .edit-mode .val-amt, .edit-mode .card-note-area, .edit-mode .card-balance-badge { display: none !important; }
        .edit-mode .edit-input-box { display: block !important; }
        .edit-mode { border: 1px solid var(--bp-pink) !important; background: #0a0a0a !important; }
        .edit-btn-group { display: none; gap: 8px; margin-top: 15px; }
        .edit-mode .edit-btn-group { display: flex !important; }

        /* Swipe Action */
        .swipe-container { position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 12px; background: #200; display: flex; align-items: stretch; }
        .swipe-delete-bg { position: absolute; top: 0; right: 0; width: 100%; height: 100%; color: #844; display: flex; align-items: center; justify-content: flex-end; padding-right: 25px; font-weight: 900; font-size: 0.75rem; z-index: 1; }
        .swipe-target { z-index: 2; position: relative; width: 100%; margin-bottom: 0 !important; transition: transform 0.2s ease-out; will-change: transform; background: var(--bp-black); }

        /* Assets & History */
        #acc-balance-list .acc-main { font-weight: 900; font-size: 1.05rem; color: #fff !important; }
        #acc-balance-list .acc-amount { text-align: right; font-weight: 900; font-size: 1.4rem; color: var(--pink-light) !important; }
        .total-asset-val { font-weight: 900; font-size: 2.1rem; color: var(--pink-light) !important; }
        .loan-detail-box { background: #0a0a0a; border-radius: 14px; padding: 12px; margin-top: 10px; border: 1px solid #222; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .loan-label { font-size: 0.62rem; color: var(--bp-pink); font-weight: 800; text-transform: uppercase; }
        .loan-val { font-size: 0.8rem; color: #eee; font-weight: 700; }
        .asset-history { display: none; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .ah-row-wrap { position: relative; margin-bottom: 10px; display: flex; }
        .ah-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #0a0a0a; border: 1px solid #222; border-left: 3px solid var(--bp-pink); border-radius: 12px; width: 100%; }
        .ah-date { font-size: 0.65rem; color: var(--bp-pink); width: 35px; font-weight: 800; }
        .ah-note-col { flex: 1; padding: 0 10px; text-align: left; overflow: hidden; }
        .ah-note { font-size: 0.75rem; color: #fff; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ah-amt { font-size: 0.85rem; font-weight: 900; color: var(--pink-light); }

        /* Stats Section */
        .stats-stack { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .stats-card { background: var(--bp-black); border-radius: 20px; padding: 20px; border: 1px solid #222; border-top: 4px solid var(--bp-pink); cursor: pointer; }
        .stats-card.fixed { border-top-color: var(--asset-pink); }
        .stats-label { font-size: 0.7rem; color: var(--text-dim); font-weight: 800; letter-spacing: 1.5px; }
        .stats-val { font-size: 1.7rem; font-weight: 900; color: var(--pink-light); }
        .section-header { background: #111; border: 1px solid #333; border-left: 4px solid var(--bp-pink); padding: 16px 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-top: 15px; }
        .stat-item-card { background: #0a0a0a; border-radius: 18px; padding: 15px; border: 1px solid #222; margin-top: 10px; cursor: pointer; }
        .progress { background-color: #1a1a1a; height: 6px !important; border-radius: 10px; }
        .bar-income { background: #fff !important; }
        .bar-asset { background: var(--asset-pink) !important; }
        .bar-expense { background: var(--bp-pink) !important; }
        .expand-container { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .expand-container.expanded { max-height: 2000px; padding-bottom: 10px; }
        .fixed-chip { background: rgba(232, 142, 163, 0.1); padding: 6px 12px; border-radius: 12px; font-size: 0.65rem; border: 1px solid rgba(232, 142, 163, 0.2); color: var(--pink-light); display: inline-block; margin: 3px; font-weight: 700; }

        .loading-inline { text-align: center; padding: 40px 0; color: var(--bp-pink); font-weight: 900; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container mt-2">
        <div class="text-center mb-3"><h4 style="color: var(--bp-pink); font-weight: 900; letter-spacing: 3px; cursor:pointer;" onclick="location.reload()">TED'S FINANCE</h4></div>
        <ul class="nav nav-pills nav-fill" id="mainTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#view-out" id="tab-out-btn">OUT</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#view-in" id="tab-in-btn">IN</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#view-tr" id="tab-tr-btn">MOVE</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#view-acc" id="tab-acc-btn">ASSETS</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#view-db" id="tab-db-btn">STATS</button></li>
        </ul>

        <div class="tab-content pt-2">
            <div class="tab-pane fade show active" id="view-out">
                <button class="btn-pink" onclick="addNewCard('OUT')">+ NEW EXPENSE</button>
                <div class="slim-filter"><input type="date" id="out-start"> <input type="date" id="out-end"> <button class="btn-query" onclick="loadHistoryTab('OUT', true)">조회</button></div>
                <div id="out-total-area" class="total-summary-row"></div>
                <div id="out-new-card-area"></div><div id="out-history-container"></div>
            </div>
            <div class="tab-pane fade" id="view-in">
                <button class="btn-pink" onclick="addNewCard('IN')">+ NEW INCOME</button>
                <div class="slim-filter">
                    <input type="date" id="in-start"> <input type="date" id="in-end"> 
                    <input type="checkbox" id="in-pure-only" onchange="loadHistoryTab('IN', true)">
                    <label for="in-pure-only" class="pure-toggle-btn">순수수익</label>
                    <button class="btn-query" onclick="loadHistoryTab('IN', true)">조회</button>
                </div>
                <div id="in-total-area" class="total-summary-row"></div>
                <div id="in-new-card-area"></div><div id="in-history-container"></div>
            </div>
            <div class="tab-pane fade" id="view-tr">
                <button class="btn-pink" onclick="addNewCard('TR')">+ NEW TRANSFER</button>
                <div class="slim-filter"><input type="date" id="tr-start"> <input type="date" id="tr-end"> <button class="btn-query" onclick="loadHistoryTab('TR', true)">조회</button></div>
                <div id="tr-new-card-area"></div><div id="tr-history-container"></div>
            </div>
            <div class="tab-pane fade" id="view-acc"><div id="acc-balance-list"></div></div>
            <div class="tab-pane fade" id="view-db">
                <div class="slim-filter">
                    <span style="font-size: 0.65rem; color: var(--bp-pink); font-weight: 900; margin-left: 5px;">MONTH</span>
                    <input type="month" id="stats-month" onchange="loadStats()">
                    <button class="btn-query" onclick="loadStats()">조회</button>
                </div>
                <div class="stats-stack">
                    <div class="stats-card" onclick="document.getElementById('balance-detail-wrapper').classList.toggle('expanded')">
                        <div class="stats-label">MONTHLY BALANCE</div>
                        <div id="db-balance" class="stats-val">0원</div>
                        <div class="expand-container" id="balance-detail-wrapper">
                            <div class="summary-detail-box mt-3" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; background:#0a0a0a; padding:15px; border-radius:15px; border:1px solid #222;">
                                <div><div class="label-mini">INCOME</div><div id="db-income-total" style="font-weight:900;">0원</div></div>
                                <div><div class="label-mini">EXPENSE</div><div id="db-expense-total" style="font-weight:900; color:var(--asset-pink);">0원</div></div>
                            </div>
                        </div>
                    </div>
                    <div class="stats-card fixed" onclick="document.getElementById('fixed-list-wrapper').classList.toggle('expanded')">
                        <div class="stats-label">FIXED REMAINING</div>
                        <div id="fixed-total-remain" class="stats-val">0원</div>
                        <div class="expand-container" id="fixed-list-wrapper"><div id="fixed-list-container" class="mt-3"></div></div>
                    </div>
                </div>
                <div id="db-sections">
                    <div class="section-header" onclick="toggleStatSection('section-income')"><span style="font-size:0.85rem; font-weight:900;">INCOME STATUS</span><span>▼</span></div>
                    <div id="section-income" class="expand-container"></div>
                    <div class="section-header" onclick="toggleStatSection('section-asset')"><span style="font-size:0.85rem; font-weight:900;">ASSET BUILDING</span><span>▼</span></div>
                    <div id="section-asset" class="expand-container"></div>
                    <div class="section-header" onclick="toggleStatSection('section-expense')"><span style="font-size:0.85rem; font-weight:900;">EXPENSE STATUS</span><span>▼</span></div>
                    <div id="section-expense" class="expand-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- 1. Supabase 설정 (여기에 본인의 정보를 입력하세요) ---
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI'; // 본인의 anon public key
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dropdownCache = { accounts: [], categories: [], trTypes: [], fixedList: [] };
        let touchStartX = 0;
        window.tempOriginalRowHtml = "";

        // --- 2. 초기화 및 마스터 데이터 로드 ---
        document.addEventListener('DOMContentLoaded', async () => {
            // 탭 이벤트 바인딩
            const triggerTabList = document.querySelectorAll('.nav-link');
            triggerTabList.forEach(el => {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    new bootstrap.Tab(this).show();
                    const tabId = this.id;
                    if(tabId==='tab-out-btn') loadHistoryTab('OUT');
                    if(tabId==='tab-in-btn') loadHistoryTab('IN');
                    if(tabId==='tab-tr-btn') loadHistoryTab('TR');
                    if(tabId==='tab-acc-btn') loadAssets();
                    if(tabId==='tab-db-btn') loadStats();
                });
            });
            await initApp();
        });

        async function initApp() {
            const now = new Date();
            const monthStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            if(document.getElementById('stats-month')) document.getElementById('stats-month').value = monthStr;

            // Supabase에서 마스터 데이터 가져오기
            const [accRes, catRes, setRes, fixRes] = await Promise.all([
                _supabase.from('accounts').select('code, name').order('id'),
                _supabase.from('categories').select('code, name, is_stats').order('id'),
                _supabase.from('settings').select('code, value').eq('category', 'TR_TYPE'),
                _supabase.from('fixed_expenses').select('*').eq('is_active', true).order('payment_day')
            ]);

            dropdownCache = {
                accounts_raw: accRes.data || [],
                accounts: (accRes.data || []).map(a => a.name),
                categories_raw: catRes.data || [],
                categories: (catRes.data || []).map(c => c.name),
                trTypes: (setRes.data || []).map(s => s.value),
                fixedList: (fixRes.data || []).map(f => ({ id: f.fixed_link, name: f.name, amt: f.amount, day: f.payment_day }))
            };

            loadHistoryTab('OUT');
        }

        // --- 3. CRUD 로직 (저장, 수정, 삭제) ---
        async function saveEdit(btn, source, id) {
            const card = btn.closest('.custom-card');
            const inputs = card.querySelectorAll('.edit-input');
            let formData = {};
            inputs.forEach(ipt => formData[ipt.dataset.field] = ipt.value);

            btn.innerHTML = "..."; btn.disabled = true;

            try {
                const amount = parseInt(String(formData.amount).replace(/[^0-9-]/g, ""));
                const account_code = dropdownCache.accounts_raw.find(a => a.name === (formData.acc || formData.fromAcc))?.code;
                
                if (source === 'TR') {
                    const to_account_code = dropdownCache.accounts_raw.find(a => a.name === formData.toAcc)?.code;
                    const payload = {
                        date: formData.date, from_account_code: account_code, to_account_code: to_account_code,
                        amount: amount, type_code: 'TX_TRANSFER', note: formData.note, fixed_link: formData.fixedLinkId || null
                    };
                    if (id === 'NEW') await _supabase.from('transfer').insert([payload]);
                    else await _supabase.from('transfer').update(payload).eq('id', id);
                } else {
                    const category_code = dropdownCache.categories_raw.find(c => c.name === formData.cat)?.code;
                    const payload = {
                        date: formData.date, amount: amount, account_code: account_code, category_code: category_code,
                        type_code: source === 'IN' ? 'TX_INCOME' : 'TX_EXPENSE',
                        note: formData.note, fixed_link: formData.fixedLinkId || null
                    };
                    if (id === 'NEW') await _supabase.from('transactions').insert([payload]);
                    else await _supabase.from('transactions').update(payload).eq('id', id);
                }
                
                if(id === 'NEW') btn.closest('.tab-pane').querySelector('[id$="-new-card-area"]').innerHTML = "";
                refreshView();
            } catch (err) {
                alert("저장 오류: " + err.message);
                btn.innerHTML = "SAVE"; btn.disabled = false;
            }
        }

        async function deleteEntry(source, id) {
            const table = source === 'MOVE' ? 'transfer' : 'transactions';
            const { error } = await _supabase.from(table).delete().eq('id', id);
            if (error) alert("삭제 실패: " + error.message);
            else refreshView();
        }

        // --- 4. 조회 및 렌더링 로직 ---
        async function loadHistoryTab(type, isSearch = false) {
            const pre = type.toLowerCase();
            const container = document.getElementById(pre + '-history-container');
            container.innerHTML = `<div class="loading-inline">...</div>`;

            const start = isSearch ? document.getElementById(pre + '-start').value : null;
            const end = isSearch ? document.getElementById(pre + '-end').value : null;

            let query;
            if (type === 'TR') {
                query = _supabase.from('transfer').select('*, from:accounts!from_account_code(name), to:accounts!to_account_code(name)');
            } else {
                query = _supabase.from('v_running_balance').select('*');
                if (type === 'IN') query = query.eq('type_code', 'TX_INCOME');
                else query = query.eq('type_code', 'TX_EXPENSE');

                if (type === 'IN' && document.getElementById('in-pure-only').checked) {
                    const pureCatCodes = dropdownCache.categories_raw.filter(c => c.is_stats).map(c => c.code);
                    query = query.in('category_code', pureCatCodes);
                }
            }

            if (start) query = query.gte('date', start);
            if (end) query = query.lte('date', end);
            
            const { data, error } = await query.order('date', { ascending: false }).order('id', { ascending: false }).limit(20);

            const totalArea = document.getElementById(pre + '-total-area');
            if (totalArea) {
                const sum = (data || []).reduce((acc, curr) => acc + curr.amount, 0);
                totalArea.innerText = `TOTAL: ${sum.toLocaleString()}원`;
            }

            container.innerHTML = (data || []).map(i => type === 'TR' ? renderTrCardOriginal(i) : renderTxCardOriginal(i)).join('') || "<p class='text-center py-5 opacity-50'>No data</p>";
        }

        async function loadAssets() {
            const list = document.getElementById('acc-balance-list');
            list.innerHTML = `<div class="loading-inline">...</div>`;

            const { data: assets } = await _supabase.from('v_account_balances').select('*, loans(*)').order('id');
            
            let total = (assets || []).reduce((sum, acc) => sum + acc.current_balance, 0);
            list.innerHTML = `<div class="text-end mb-4"><small class="label-mini">TOTAL ASSETS</small><h4 class="total-asset-val">${Math.round(total).toLocaleString()}원</h4></div>` + 
                (assets || []).map(acc => renderAssetCard(acc)).join('');
        }

        async function loadStats() {
            const targetMonth = document.getElementById('stats-month').value;
            const { data, error } = await _supabase.rpc('get_dashboard_data', { target_month: targetMonth });
            
            if (!data) return;

            document.getElementById('db-balance').innerText = Math.round(data.summary.balance).toLocaleString() + "원";
            document.getElementById('db-income-total').innerText = Math.round(data.summary.income).toLocaleString() + "원";
            document.getElementById('db-expense-total').innerText = Math.round(data.summary.expense).toLocaleString() + "원";
            
            const fr = document.getElementById('fixed-total-remain');
            const fc = document.getElementById('fixed-list-container');
            fr.innerText = Math.round(data.fixedStats.remainingAmt).toLocaleString() + "원";
            fc.innerHTML = (data.fixedStats.remainingItems || []).map(i => `<div class="fixed-chip">${i.day}일 | ${i.name}</div>`).join('') || "완료! 🌸";

            const renderItems = (items, cls) => (items || []).map(c => `
                <div class="stat-item-card">
                    <div class="d-flex justify-content-between mb-2"><span style="font-weight:800;">${c.name}</span><span style="color:var(--bp-pink); font-weight:900;">${c.percent}%</span></div>
                    <div class="progress mb-2"><div class="progress-bar ${cls}" style="width:${Math.min(c.percent, 100)}%"></div></div>
                    <div class="d-flex justify-content-between small opacity-75"><span>${Math.round(c.actual).toLocaleString()}원</span><span>예산 ${Math.round(c.budget).toLocaleString()}</span></div>
                </div>`).join('') || "<p class='text-center py-3 opacity-50'>데이터 없음</p>";

            document.getElementById('section-income').innerHTML = renderItems(data.topExpenses.income, "bar-income");
            document.getElementById('section-asset').innerHTML = renderItems(data.topExpenses.asset, "bar-asset");
            document.getElementById('section-expense').innerHTML = renderItems(data.topExpenses.expense, "bar-expense");
        }

        async function updateLiveBalance(selectEl, suffix = '') {
            const card = selectEl.closest('.custom-card');
            const balanceArea = card.querySelector(suffix ? `.live-balance-${suffix}` : '.live-balance-main');
            const accName = selectEl.value;
            const accCode = dropdownCache.accounts_raw.find(a => a.name === accName)?.code;
            if(!accCode) return;

            const { data } = await _supabase.from('v_account_balances').select('current_balance').eq('account_code', accCode).single();
            if (balanceArea) balanceArea.innerText = `Balance: ${Math.round(data?.current_balance || 0).toLocaleString()}원`;
        }

        // --- 5. UI 유틸리티 (렌더링, 이벤트) ---
        function renderTxCardOriginal(i) {
            return `<div class="swipe-container"><div class="swipe-delete-bg">DEL</div><div class="custom-card swipe-target" data-id="${i.id}" data-source="TX" ontouchstart="handleSwipeStart(event)" ontouchmove="handleSwipeMove(event)" ontouchend="handleSwipeEnd(event)">
                <div class="card-grid">
                    <div><div class="label-mini">DATE</div><div class="val-text">${i.date}</div></div>
                    <div class="text-end"><div class="label-mini">CATEGORY</div><div class="val-text">${i.category_name || '기타'}</div></div>
                    <div class="card-full"><div class="label-mini">ACCOUNT</div><div class="val-text">${i.account_name}</div></div>
                    <div class="card-full text-end"><div class="val-amt">${Math.round(i.amount).toLocaleString()}원</div><div class="card-balance-badge">Balance: ${Math.round(i.running_balance).toLocaleString()}원</div></div>
                    <div class="card-full card-note-area">${i.note || '-'}</div>
                </div></div></div>`;
        }

        function renderTrCardOriginal(i) {
            return `<div class="swipe-container"><div class="swipe-delete-bg">DEL</div><div class="custom-card swipe-target" style="border-left-color:#fff" data-id="${i.id}" data-source="MOVE" ontouchstart="handleSwipeStart(event)" ontouchmove="handleSwipeMove(event)" ontouchend="handleSwipeEnd(event)">
                <div class="card-grid">
                    <div><div class="label-mini">DATE</div><div class="val-text">${i.date}</div></div>
                    <div class="text-end"><div class="label-mini">TYPE</div><div class="val-text">이체</div></div>
                    <div class="card-full tr-row-wrap">
                        <div class="tr-col"><div class="label-mini">FROM</div><div class="val-text">${i.from?.name || i.from_account_code}</div></div>
                        <div class="tr-amt-col"><div class="val-amt">${Math.round(i.amount).toLocaleString()}</div></div>
                        <div class="tr-col text-end"><div class="label-mini">TO</div><div class="val-text">${i.to?.name || i.to_account_code}</div></div>
                    </div>
                    <div class="card-full card-note-area">${i.note || '-'}</div>
                </div></div></div>`;
        }

        function renderAssetCard(acc) {
            let borderColor = "var(--bp-pink)";
            const type = acc.account_type;
            if (type === "신용카드" || type === "대출계좌") borderColor = "#e83e8c";
            else if (type === "상품권" || type === "미수금") borderColor = "#ffffff";

            let loanHtml = acc.loans ? `<div class="loan-detail-box">
                <div><div class="loan-label">이율</div><div class="loan-val">${acc.loans.interest_rate}%</div></div>
                <div><div class="loan-label">납부일</div><div class="loan-val">${acc.loans.payment_day}일</div></div>
                <div class="card-full border-top pt-2"><div class="loan-label">만기일</div><div class="loan-val">${acc.loans.expiry_date}</div></div>
            </div>` : "";

            return `<div class="custom-card mb-3" style="border-left-color: ${borderColor}">
                <div class="small opacity-50 mb-1">${acc.bank} | ${acc.account_type}</div>
                <div class="acc-main">${acc.account_name}</div>
                <div class="acc-amount">${Math.round(acc.current_balance).toLocaleString()}원</div>
                ${loanHtml}
            </div>`;
        }

        function addNewCard(type) {
            const area = document.getElementById(type.toLowerCase() + '-new-card-area');
            if(area.innerHTML !== "") return;
            const today = new Date().toISOString().split('T')[0];
            const fixedOptions = `<option value="">-- 고정비 연결 없음 --</option>` + dropdownCache.fixedList.map(f => `<option value="${f.id}">${f.day}일 | ${f.name} (${f.amt.toLocaleString()})</option>`).join('');

            let html = "";
            if (type === 'TR') {
                html = `<div class="custom-card edit-mode" style="border-left-color:#fff"><div class="card-grid">
                    <div><div class="label-mini">DATE</div><input type="date" class="form-control form-control-sm edit-input" data-field="date" value="${today}"></div>
                    <div class="text-end"><div class="label-mini">TYPE</div><select class="form-select form-select-sm edit-input" data-field="type">${dropdownCache.trTypes.map(t=>`<option>${t}</option>`).join('')}</select></div>
                    <div class="card-full tr-row-wrap">
                        <div class="tr-col"><div class="label-mini">FROM</div><select class="form-select form-select-sm edit-input" data-field="fromAcc" onchange="updateLiveBalance(this, 'from')">${dropdownCache.accounts.map(a=>`<option>${a}</option>`).join('')}</select><div class="live-balance-from live-balance-box"></div></div>
                        <div class="tr-amt-col"><div class="label-mini text-center">금액</div><input type="number" class="form-control form-control-sm edit-input text-center" data-field="amount" value="0"></div>
                        <div class="tr-col text-end"><div class="label-mini">TO</div><select class="form-select form-select-sm edit-input" data-field="toAcc" onchange="updateLiveBalance(this, 'to')">${dropdownCache.accounts.map(a=>`<option>${a}</option>`).join('')}</select><div class="live-balance-to live-balance-box"></div></div>
                    </div>
                    <div class="card-full"><div class="label-mini">MEMO</div><input type="text" class="form-control form-control-sm edit-input" data-field="note"></div>
                    <div class="card-full d-flex gap-2 mt-3"><button class="btn-edit-cancel" onclick="this.closest('#tr-new-card-area').innerHTML=''">CANCEL</button><button class="btn-edit-save" onclick="saveEdit(this,'TR','NEW')">SAVE</button></div>
                </div></div>`;
            } else {
                html = `<div class="custom-card edit-mode"><div class="card-grid">
                    <div><div class="label-mini">DATE</div><input type="date" class="form-control form-control-sm edit-input" data-field="date" value="${today}"></div>
                    <div class="text-end"><div class="label-mini">CATEGORY</div><select class="form-select form-select-sm edit-input" data-field="cat">${dropdownCache.categories.map(c=>`<option>${c}</option>`).join('')}</select></div>
                    <div class="card-full"><div class="label-mini">ACCOUNT</div><select class="form-select form-select-sm edit-input" data-field="acc" onchange="updateLiveBalance(this)">${dropdownCache.accounts.map(a=>`<option>${a}</option>`).join('')}</select><div class="live-balance-main live-balance-box"></div></div>
                    <div class="card-full"><div class="label-mini">AMOUNT</div><input type="number" class="form-control form-control-sm edit-input text-end" data-field="amount" value="0"></div>
                    <div class="card-full"><div class="label-mini">FIXED LINK</div><select class="form-select form-select-sm edit-input" data-field="fixedLinkId">${fixedOptions}</select></div>
                    <div class="card-full"><div class="label-mini">MEMO</div><input type="text" class="form-control form-control-sm edit-input" data-field="note"></div>
                    <div class="card-full d-flex gap-2 mt-3"><button class="btn-edit-cancel" onclick="this.closest('[id$=-new-card-area]').innerHTML=''">CANCEL</button><button class="btn-edit-save" onclick="saveEdit(this,'${type}','NEW')">SAVE</button></div>
                </div></div>`;
            }
            area.innerHTML = html;
        }

        function handleSwipeStart(e) { touchStartX = e.touches[0].clientX; }
        function handleSwipeMove(e) { const diff = touchStartX - e.touches[0].clientX; if (diff > 5 && diff < 100) e.currentTarget.style.transform = `translateX(-${diff}px)`; }
        function handleSwipeEnd(e) { 
            const diff = touchStartX - e.changedTouches[0].clientX; 
            const { id, source } = e.currentTarget.dataset;
            if (diff > 60 && confirm("정말 삭제하시겠습니까?")) deleteEntry(source, id);
            e.currentTarget.style.transform = `translateX(0px)`; 
        }

        function toggleStatSection(id) { document.getElementById(id).classList.toggle('expanded'); }
        function refreshView() { 
            const aid = document.querySelector('.nav-link.active').id;
            if(aid === 'tab-acc-btn') loadAssets(); 
            else if(aid === 'tab-db-btn') loadStats(); 
            else if(aid === 'tab-out-btn') loadHistoryTab('OUT', true);
            else if(aid === 'tab-in-btn') loadHistoryTab('IN', true);
            else if(aid === 'tab-tr-btn') loadHistoryTab('TR', true);
        }
    </script>
</body>
</html>
