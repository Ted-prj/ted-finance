<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TED DIET - Data Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bp-pink: rgb(232, 142, 163);
            --bp-black: #000;
            --bp-dark-gray: #121212;
            --neon-pink: #FF3F7E;
            --text-dim: #888;
        }
        body { background-color: var(--bp-black); color: #fff; font-family: 'Pretendard', sans-serif; padding-bottom: 50px; }
        
        /* 로그인 오버레이 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-input { max-width: 200px; font-size: 1.5rem; letter-spacing: 10px; background: #000 !important; border: 2px solid #333 !important; text-align: center; color: var(--bp-pink) !important; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; display: none; }
        
        /* 탭 스타일 */
        .nav-pills .nav-link { color: var(--bp-pink); font-weight: 800; border-radius: 12px; margin: 5px; border: 1px solid transparent; }
        .nav-pills .nav-link.active { background-color: var(--bp-pink) !important; color: #000 !important; }
        
        /* 카드 및 텍스트박스 */
        .hub-card { background: var(--bp-dark-gray); border-radius: 24px; padding: 20px; border: 1px solid #252525; margin-bottom: 20px; }
        .form-check-input:checked { background-color: var(--bp-pink); border-color: var(--bp-pink); }
        .csv-box { background: #080808 !important; color: #00ff41 !important; font-family: 'Courier New', monospace; font-size: 0.75rem; border-radius: 15px; border: 1px solid #333 !important; white-space: pre; overflow-x: auto; }
        
        .btn-action { background: var(--bp-pink); color: #000; border: none; border-radius: 12px; font-weight: 900; padding: 10px 15px; font-size: 0.8rem; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }
        .btn-outline { background: transparent; color: var(--bp-pink); border: 1px solid var(--bp-pink); border-radius: 12px; font-weight: 800; padding: 8px 12px; font-size: 0.75rem; }
        
        .table-badge { background: #1a1a1a; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; color: var(--text-dim); border: 1px solid #333; margin-right: 5px; margin-bottom: 5px; display: inline-block; }
        .table-badge.active { border-color: var(--bp-pink); color: var(--bp-pink); }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="text-center w-75">
            <h4 style="color:var(--bp-pink); font-weight:900; letter-spacing:3px; margin-bottom: 20px;">DIET IDENTITY</h4>
            <input type="password" id="pw-input" class="form-control auth-input mx-auto" maxlength="4" inputmode="numeric" autofocus oninput="if(this.value.length===4) verify()">
            <div id="auth-msg" class="text-danger mt-3 small" style="font-weight: 800;"></div>
        </div>
    </div>

    <div class="container" id="main-app">
        <div class="text-center mb-4">
            <h3 style="color:var(--bp-pink); font-weight:900; cursor:pointer;" onclick="location.href='workout_index.html'">TED'S DIET HUB</h3>
            <p style="font-size:0.7rem; color:var(--text-dim);">LUKA COACHING BRIDGE SYSTEM</p>
        </div>

        <ul class="nav nav-pills nav-fill mb-4" id="dietTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-extract">EXPORT</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-insert">IMPORT</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-extract">
                <div class="hub-card">
                    <h6 style="font-weight:900; color:var(--bp-pink); margin-bottom:15px;">SELECT TABLES</h6>
                    <div id="table-select-list" class="row g-2 mb-3">
                        </div>
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <button class="btn-outline" onclick="processExport('col')">칼럼명만</button>
                        <button class="btn-outline" onclick="processExport('data')">데이터만</button>
                        <button class="btn-outline" onclick="processExport('both')">전체 CSV</button>
                    </div>
                    <textarea id="export-csv-output" class="form-control csv-box mb-3" rows="10" placeholder="추출된 데이터가 여기에 표시됩니다."></textarea>
                    <button class="btn-action w-100" onclick="copyToClipboard()">CSV 복사하기 (루카에게 전달)</button>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-insert">
                <div class="hub-card">
                    <h6 style="font-weight:900; color:var(--bp-pink); margin-bottom:15px;">PASTE LUKA'S CSV</h6>
                    <textarea id="import-csv-input" class="form-control csv-box mb-3" rows="10" placeholder="루카가 준 CSV 데이터를 입력하세요." oninput="analyzeCSV()"></textarea>
                    
                    <div id="detected-tables-area" style="display:none;">
                        <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:5px;">입력 감지된 테이블:</p>
                        <div id="detected-badges" class="mb-3"></div>
                        <button id="btn-final-insert" class="btn-action w-100" onclick="finalInsert()">데이터 최종 INSERT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI';
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DIET_TABLES = [
            { id: 'ai_rulebook', name: '1. AI 룰셋' },
            { id: 'user_goals', name: '2. 사용자 정보' },
            { id: 'inbody_logs', name: '3. 인바디 기록' },
            { id: 'meal_logs', name: '4. 식단 로그' },
            { id: 'exercise_logs', name: '5. 운동 로그' },
            { id: 'condition_logs', name: '6. 생활/컨디션' },
            { id: 'strategies', name: '7. 다이어트 전략' }
        ];

        window.onload = () => { document.getElementById('pw-input').focus(); };

        async function verify() {
            const pw = document.getElementById('pw-input').value;
            const { data } = await _db.from('settings').select('value').eq('code', 'ACCESS_PW').single();
            if(data?.value === pw) {
                document.getElementById('auth-overlay').style.display='none';
                document.getElementById('main-app').style.display='block';
                initUI();
            } else {
                document.getElementById('auth-msg').innerText = "WRONG PASSWORD";
                document.getElementById('pw-input').value = "";
            }
        }

        function initUI() {
            const list = document.getElementById('table-select-list');
            list.innerHTML = DIET_TABLES.map(t => `
                <div class="col-6">
                    <div class="form-check">
                        <input class="form-check-input table-check" type="checkbox" value="${t.id}" id="chk-${t.id}">
                        <label class="form-check-label small" for="chk-${t.id}">${t.name}</label>
                    </div>
                </div>
            `).join('');
        }

        // --- 탭 1: CSV 추출 로직 ---
        async function processExport(mode) {
            const selectedTables = Array.from(document.querySelectorAll('.table-check:checked')).map(el => el.value);
            if(selectedTables.length === 0) return alert("테이블을 선택하세요.");
            
            let finalCsv = "";
            for(const tableId of selectedTables) {
                const tableInfo = DIET_TABLES.find(t => t.id === tableId);
                finalCsv += `[${tableInfo.name}]\n`;
                
                const { data, error } = await _db.schema('diet').from(tableId).select('*').order('id');
                if (data && data.length > 0) {
                    const columns = Object.keys(data[0]);
                    if(mode === 'col' || mode === 'both') {
                        finalCsv += columns.join(',') + '\n';
                    }
                    if(mode === 'data' || mode === 'both') {
                        data.forEach(row => {
                            finalCsv += columns.map(col => {
                                let val = row[col] === null ? "" : row[col];
                                if (typeof val === 'string' && val.includes(',')) val = `"${val}"`;
                                return val;
                            }).join(',') + '\n';
                        });
                    }
                }
                finalCsv += '\n';
            }
            document.getElementById('export-csv-output').value = finalCsv.trim();
        }

        function copyToClipboard() {
            const box = document.getElementById('export-csv-output');
            box.select();
            document.execCommand('copy');
            alert("CSV가 클립보드에 복사되었습니다! 루카에게 전달하세요. 🖤💖");
        }

        // --- 탭 2: 데이터 입력 분석 로직 ---
        let DETECTED_DATA = {};

        function analyzeCSV() {
            const input = document.getElementById('import-csv-input').value;
            const area = document.getElementById('detected-tables-area');
            const badgeContainer = document.getElementById('detected-badges');
            
            if(!input.trim()) { area.style.display = 'none'; return; }
            
            DETECTED_DATA = {};
            badgeContainer.innerHTML = "";
            
            // 단순 분석 로직: [테이블명] 패턴 탐색
            DIET_TABLES.forEach(t => {
                if(input.includes(`[${t.name}]`)) {
                    DETECTED_DATA[t.id] = true;
                    badgeContainer.innerHTML += `<span class="table-badge active">${t.name}</span>`;
                }
            });

            if(Object.keys(DETECTED_DATA).length > 0) {
                area.style.display = 'block';
            } else {
                area.style.display = 'none';
            }
        }

        async function finalInsert() {
            const input = document.getElementById('import-csv-input').value;
            if(!confirm("감지된 테이블의 데이터를 DB에 추가하시겠습니까?")) return;

            const sections = input.split(/\[\d+\.\s[^\]]+\]/); // [숫자. 명칭] 패턴으로 분할
            const headers = input.match(/\[\d+\.\s[^\]]+\]/g);

            try {
                for(let i=0; i<headers.length; i++) {
                    const tableName = headers[i].replace(/[\[\]]/g, '').trim();
                    const tableId = DIET_TABLES.find(t => tableName.includes(t.name.split('.')[1].trim()))?.id;
                    
                    if(!tableId) continue;

                    const rows = sections[i+1].trim().split('\n');
                    const cols = rows[0].split(',');
                    const dataRows = rows.slice(1).map(r => {
                        const vals = r.split(',');
                        let obj = {};
                        cols.forEach((c, idx) => {
                            let cleanCol = c.trim();
                            // ID와 created_at은 DB 자동생성을 위해 제외하는 것이 안전
                            if(cleanCol !== 'id' && cleanCol !== 'created_at') {
                                obj[cleanCol] = vals[idx]?.replace(/^"|"$/g, '').trim() || null;
                            }
                        });
                        return obj;
                    }).filter(obj => Object.keys(obj).length > 0);

                    if(dataRows.length > 0) {
                        const { error } = await _db.schema('diet').from(tableId).insert(dataRows);
                        if(error) throw error;
                    }
                }
                alert("데이터 이관 완료! 🥗");
                document.getElementById('import-csv-input').value = "";
                analyzeCSV();
            } catch(e) {
                alert("INSERT 중 오류 발생: " + e.message);
            }
        }
    </script>
</body>
</html>
