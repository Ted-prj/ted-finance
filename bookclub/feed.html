<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-center">
                <h1><i class="fa-solid fa-heart-pulse text-pink" style="color: var(--neon-pink);"></i> 소통 <span>FEED</span></h1>
                <div class="d-flex align-items-center">
                    <img id="myAvatarHeader" src="images/default_princess.png" class="princess-avatar-sm" onerror="this.src='images/default_princess.png'">
                    <span class="badge bg-dark border border-pink text-pink p-2" id="userBadge" style="color: var(--bp-pink) !important;">공주님</span>
                </div>
            </div>
            <p class="text-muted mt-2 m-0">오직 이번 달 티타임과 다음 달 픽만 실시간 큐레이션하옵니다 💖</p>
        </div>

        <div class="stat-card">
            <div class="card-header-custom" id="recHeaderTitle">
                <i class="fa-solid fa-paper-plane"></i> 다음 달 추천 릴레이 현황
            </div>
            <div class="card-body-custom">
                <div id="recommendationFeedList">
                    <div class="text-center py-3"><div class="spinner-border spinner-pink" role="status"></div></div>
                </div>
            </div>
        </div>

        <div class="stat-card mt-3">
            <div class="card-header-custom" id="reviewHeaderTitle">
                <i class="fa-solid fa-comments"></i> 이번 달 공주님들의 생생 별점 & 총평
            </div>
            <div class="card-body-custom">
                <div id="reviewFeedList">
                    <div class="text-center py-3"><div class="spinner-border spinner-pink" role="status"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="feed.html" class="bottom-nav-item active">
            <i class="fa-solid fa-rss"></i>
            <span>소통 피드</span>
        </a>
        <a href="write.html" class="bottom-nav-item">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>비밀 기록</span>
        </a>
        <a href="dashboard.html" class="bottom-nav-item">
            <i class="fa-solid fa-crown"></i>
            <span>핑크 라운지</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    
    <script>
        checkAuth();
        const memberImages = {}; 

        document.addEventListener("DOMContentLoaded", async () => {
            document.getElementById("userBadge").textContent = `👸 ${getLoggedInMember()} 공주`;
            document.getElementById("myAvatarHeader").src = `images/${localStorage.getItem("login_member_image") || 'default_princess.png'}`;
            
            await syncMemberAvatars();
            loadTargetFeeds();
        });

        async function syncMemberAvatars() {
            try {
                const { data } = await _db.from('members').select('member_name, image_name');
                if (data) {
                    data.forEach(m => {
                        memberImages[m.member_name] = m.image_name;
                    });
                }
            } catch(e) { console.error("아바타 맵 동기화 실패:", e); }
        }

        async function loadTargetFeeds() {
            try {
                const now = new Date();
                const future = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                const nextMonthStr = `${future.getFullYear()}-${String(future.getMonth() + 1).padStart(2, '0')}`;
                
                document.getElementById("recHeaderTitle").innerHTML = `<i class="fa-solid fa-paper-plane"></i> 💌 다음 달(${future.getMonth() + 1}월) 추천 릴레이 현황`;

                const { data: bookData } = await _db
                    .from('books')
                    .select('round_no, title')
                    .order('round_no', { ascending: false })
                    .limit(1);
                
                const latestRound = bookData && bookData.length > 0 ? bookData[0].round_no : 0;
                const latestTitle = bookData && bookData.length > 0 ? bookData[0].title : '지정 도서 없음';

                document.getElementById("reviewHeaderTitle").innerHTML = `<i class="fa-solid fa-comments"></i> ☕ 이번 달(${latestRound}회차) 공주님들의 생생 별점 & 총평`;

                await Promise.all([
                    fetchFilteredRecommendations(nextMonthStr, future.getMonth() + 1),
                    fetchFilteredReviews(latestRound, latestTitle)
                ]);

            } catch (err) {
                console.error("피드 가동 타겟팅 실패:", err);
            }
        }

        // 1. 다음 달(M+1) 책 목록 패치 (별칭을 도려내고 작가 데이터로 전면 교체!)
        async function fetchFilteredRecommendations(targetMonth, nextMonthNum) {
            const container = document.getElementById("recommendationFeedList");
            try {
                const { data, error } = await _db
                    .from('recommendations')
                    .select('*')
                    .eq('target_month', targetMonth)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-4 text-muted small">
                            <i class="fa-solid fa-envelope-open-text d-block fs-3 mb-2" style="color: rgba(255,105,180,0.3);"></i>
                            아직 어떤 공주님도 ${nextMonthNum}월 추천작을 내지 않으셨사옵니다. <br>어서 첫 발자취를 남겨보셔요!
                        </div>`;
                    return;
                }

                data.forEach(item => {
                    const avatarFile = memberImages[item.member_name] || 'default_princess.png';
                    container.innerHTML += `
                        <div class="p-3 mb-2 border-bottom border-secondary bg-dark rounded-3 d-flex align-items-center" style="border-color: rgba(255,0,127,0.1) !important;">
                            <img src="images/${avatarFile}" class="princess-avatar-mid" onerror="this.src='images/default_princess.png'">
                            <div class="w-100">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="fw-bold text-pink" style="color: var(--bp-pink) !important;">${item.member_name} 공주 픽</span>
                                    <span class="badge bg-secondary" style="font-size:0.7rem; background-color: rgba(255,0,127,0.15) !important; color: var(--bp-pink) !important;">${nextMonthNum}월 모임용</span>
                                </div>
                                <h6 class="text-white fw-bold mb-1"><i class="fa-solid fa-book-sparkles me-1 text-warning"></i> ${item.title}</h6>
                                <p class="text-muted small m-0" style="font-size:0.8rem; color: var(--text-muted) !important;">✍️ 작가: ${item.author || '미상'}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-danger small">추천 릴레이 패치 실패</p>`;
            }
        }

        // 2. 이번 달(최신 차수) 책에 달린 총평 및 별점 패치
        async function fetchFilteredReviews(roundNo, bookTitle) {
            const container = document.getElementById("reviewFeedList");
            try {
                const { data, error } = await _db
                    .from('reviews_ratings')
                    .select('*')
                    .eq('round_no', roundNo)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-4 text-muted small">
                            <i class="fa-solid fa-mug-tea d-block fs-3 mb-2" style="color: rgba(255,105,180,0.3);"></i>
                            이번 ${roundNo}회차 도서 <b>[${bookTitle}]</b>에 <br>달린 별점 총평이 아직 없사옵니다. 🎉
                        </div>`;
                    return;
                }

                container.innerHTML = `
                    <div class="small mb-3 px-2 py-1 rounded bg-black text-center border border-secondary text-truncate" style="color: var(--bp-pink) !important; border-color: rgba(255,105,180,0.2) !important;">
                        📖 이번 달 선정 도서 : <b>${bookTitle}</b>
                    </div>
                `;

                data.forEach(item => {
                    const avatarFile = memberImages[item.member_name] || 'default_princess.png';
                    const stars = item.rating ? '★'.repeat(Math.floor(item.rating)) + (item.rating % 1 !== 0 ? '½' : '') : '평가전';
                    
                    container.innerHTML += `
                        <div class="p-3 mb-2 rounded-3 d-flex align-items-start" style="background-color: #22101A; border: 1px dashed rgba(255,105,180,0.2);">
                            <img src="images/${avatarFile}" class="princess-avatar-mid mt-1" onerror="this.src='images/default_princess.png'">
                            <div class="w-100">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="fw-bold text-white" style="font-size:0.9rem;">${item.member_name} 공주</span>
                                    <span class="text-warning fw-bold" style="color: var(--royal-gold) !important; font-size:0.85rem;">${stars} <small style="color:#aaa;">(${item.rating || '0'})</small></span>
                                </div>
                                <p class="text-white m-0 small mt-1" style="line-height:1.4; word-break: break-all; font-weight:400;">
                                    "${item.review_text || '아직 별점만 남겨두고 수다 장전 중이셔요.'}"
                                </p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-danger small">총평 피드 패치 실패</p>`;
            }
        }
    </script>
</body>
</html>
