<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독한녀들 Book Club - Gate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* 👑 입장 버튼 전용 럭셔리 펄스 애니메이션 */
        .entrance-profile-btn {
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
        }
        .entrance-profile-btn:active {
            transform: scale(0.92);
        }
        .entrance-profile-btn img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border: 4px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            border-radius: 50%;
        }
        .entrance-label {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FF007F, #FF69B4);
            color: white;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 10px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body style="background-color: var(--bp-black); overflow: hidden;"> 
    <div class="login-container container-fluid px-3">
        <div class="login-box p-4" style="max-width: 355px; border-radius: 26px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);">
            
            <h2 class="brand-logo mb-1" style="font-size: 1.9rem; letter-spacing: -0.5px;">독한녀들 <span>👑</span></h2>
            <p class="text-muted mb-3" style="font-size: 0.78rem;">러블리 공주님들의 시크릿 술타임 관문</p>

            <div class="mb-3 rounded text-start" id="upcomingNoticeBox"
                 style="background: rgba(255, 0, 127, 0.03); border: 1px dashed rgba(255, 0, 127, 0.3); padding: 14px 16px;">
                <div class="fw-bold text-pink mb-2" style="font-size: 0.82rem; letter-spacing: 0.5px;">
                    <i class="fa-solid fa-mug-hot me-1 text-warning"></i> 다음 술타임 개최 예고장
                </div>
                <div id="upcomingContent" class="text-white">
                    <span class="text-muted small">예고 스펙 스캔 중...</span>
                </div>
            </div>

            <div class="mb-3 rounded text-start" id="gateNaggingBox"
                 style="background: rgba(255, 215, 0, 0.02); border: 1px dashed rgba(218, 165, 32, 0.3); padding: 14px 16px;">
                <div class="fw-bold text-warning mb-1.5" style="font-size: 0.82rem; letter-spacing: 0.5px;">
                    <i class="fa-solid fa-bullhorn me-1"></i> 🚨 이번 차수 나의 숙제 점검
                </div>
                <div id="gateNaggingContent" style="line-height: 1.5; color: var(--text-muted); font-size: 0.78rem;">
                    <span class="text-muted">공주님의 레코드 분석 중...</span>
                </div>
            </div>

            <div id="loginFormArea">
                <div class="mb-2.5 text-start">
                    <label class="form-label text-pink small fw-bold mb-1.5" style="font-size:0.75rem;"><i class="fa-solid fa-wand-magic-sparkles"></i> 오늘 수다 떨 공주님은 누구? 💕</label>
                    <select class="form-select form-select-custom py-2 px-3" id="memberSelect" onchange="updateHomeworkDisplay()" style="font-size:0.85rem; border-radius: 10px;">
                        <option value="">정예 공주님을 선택하셔요 🎀</option>
                    </select>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label text-pink small fw-bold mb-1.5" style="font-size:0.75rem;"><i class="fa-solid fa-key"></i> 시크릿 시그널 (숫자 4자리) 🤫</label>
                    <input type="password" class="form-control form-control-custom password-box-princess text-center py-2 text-white fw-bold" 
                           id="passwordInput" maxlength="4" placeholder="••••" inputmode="numeric" pattern="[0-9]*" onkeyup="handlePasswordAutoSubmit()" style="font-size:1rem; letter-spacing: 2px; border-radius: 10px;">
                </div>

                <p class="text-muted m-0 px-1 mb-1" style="font-size: 0.7rem; line-height: 1.4;">
                    ※ 공주님 선택 후 패스워드 4자리를 입력하시면 <br>시크릿 아지트로 자동 입장되옵니다.
                </p>
            </div>

            <div id="authenticatedArea" class="d-none text-center py-2">
                <div class="entrance-profile-btn" onclick="forceEnterToFeed()">
                    <img id="gateProfileImg" src="images/default_princess.png" onerror="this.src='images/default_princess.png'">
                    <div class="entrance-label">입장하기 <i class="fa-solid fa-heart"></i></div>
                </div>
                <div class="mt-3">
                    <span class="fw-bold text-white" style="font-size: 0.95rem;">
                        <span id="authPrincessName" class="text-pink">공주</span>님 납시오!
                    </span>
                </div>
            </div>
            
            <div id="errorMessageArea" class="text-danger fw-bold mt-2 d-none" style="font-size: 0.72rem;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>

    <script>
        let globalTargetRound = null; // 실시간 레이더 추적용 전역 차수 고정 앵커

        document.addEventListener("DOMContentLoaded", async () => {
            await fetchGateActiveMembers();
            await fetchUpcomingTeatimeAndNaggingSpecs();
            evaluateGateSessionUI();
        });

        function evaluateGateSessionUI() {
            const loggedInUser = localStorage.getItem("login_member");
            const loggedInImg = localStorage.getItem("login_member_image");
            const loginForm = document.getElementById("loginFormArea");
            const authArea = document.getElementById("authenticatedArea");

            if (loggedInUser) {
                loginForm.classList.add("d-none");
                document.getElementById("authPrincessName").textContent = loggedInUser;
                document.getElementById("gateProfileImg").src = `images/${loggedInImg || 'default_princess.png'}`;
                authArea.classList.remove("d-none");
            } else {
                loginForm.classList.remove("d-none");
                authArea.classList.add("d-none");
            }
        }

        function forceEnterToFeed() {
            window.location.href = "feed.html";
        }

        // 👑 [Golden Schema 변환]: 관계형 구조에 맞추어 option의 value값을 이름 대신 고유 'id'로 정밀 교체!
        async function fetchGateActiveMembers() {
            const select = document.getElementById("memberSelect");
            try {
                const { data, error } = await _db
                    .from('members')
                    .select('id, member_name, image_name')
                    .eq('is_active', true)
                    .order('member_name', { ascending: true });

                if (error) throw error;
                
                data.forEach(m => {
                    const option = document.createElement("option");
                    option.value = m.id; // 고유 숫자 ID 직격 박기
                    option.textContent = `${m.member_name} 공주님`;
                    option.setAttribute("data-name", m.member_name);
                    option.setAttribute("data-image", m.image_name);
                    select.appendChild(option);
                });
            } catch (err) { console.error(err); }
        }

        async function fetchUpcomingTeatimeAndNaggingSpecs() {
            const contentZone = document.getElementById("upcomingContent");
            
            try {
                const { data: books, error: bkErr } = await _db
                    .from('books')
                    .select('round_no, title, discussion_date, location')
                    .eq('is_closed', false)
                    .order('round_no', { ascending: true });

                if (bkErr) throw bkErr;

                if (!books || books.length === 0) {
                    contentZone.innerHTML = `<div class="text-muted small text-center py-2">현재 대기중인 다음 티타임 일정이 없사옵니다. ☕</div>`;
                    document.getElementById("gateNaggingContent").innerHTML = `<span class="text-success fw-bold"><i class="fa-solid fa-square-check"></i> 추적할 라이브 차수가 없사옵니다.</span>`;
                    return;
                }

                globalTargetRound = books[0].round_no;
                const formattedDate = books[0].discussion_date ? books[0].discussion_date : '개최 날짜 미정 📅';
                const formattedLocation = books[0].location ? books[0].location : '개최 장소 조율 중 📍';
                const bookTitles = books.map(b => `<b>[${b.title}]</b>`).join(', ');

                contentZone.innerHTML = `
                    <div class="text-white text-truncate mb-2" style="font-size:0.82rem; font-weight:500; line-height: 1.4;">
                        <span class="badge bg-secondary me-1" style="background-color: rgba(255,105,180,0.18) !important; color:var(--bp-pink) !important; font-size:0.68rem; vertical-align: middle;">제 ${globalTargetRound}회</span> ${bookTitles}
                    </div>
                    <div class="rounded" style="background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 105, 180, 0.12); padding: 12px 14px; line-height: 1.5;">
                        <div class="text-warning fw-black" style="font-size: 0.95rem; letter-spacing: 0.3px; color: var(--royal-gold) !important; margin-bottom: 4px;">
                            <i class="fa-solid fa-calendar-days me-1.5" style="font-size:0.85rem;"></i>${formattedDate}
                        </div>
                        <div class="text-white fw-bold text-truncate" style="font-size: 0.85rem; color: rgba(255,255,255,0.9) !important;">
                            <i class="fa-solid fa-location-dot me-1.5 text-pink" style="color: var(--neon-pink); font-size:0.85rem;"></i>${formattedLocation}
                        </div>
                    </div>
                `;

                // 상단 구동 직후 숙제 상태 하이브리드 점검 연쇄 발사
                await updateHomeworkDisplay();

            } catch (err) {
                console.error(err);
                contentZone.innerHTML = `<span class="text-danger small">초대장 스펙 수색 실패</span>`;
            }
        }

        // 👑 [명세 대개조 적용]: 로그인 컨텍스트 기반 1:1 전용 숙제 미완료 색출 제어 엔진
        async function updateHomeworkDisplay() {
            const naggingZone = document.getElementById("gateNaggingContent");
            if (!globalTargetRound) return;

            // 이미 세션이 있는 유저 ID거나 드롭다운에서 방금 고른 가변 공주의 ID 확보
            const loggedInId = localStorage.getItem("login_member_id");
            const selectEl = document.getElementById("memberSelect");
            const targetId = loggedInUserIdContext = loggedInId || selectEl.value;

            if (!targetId) {
                naggingZone.innerHTML = `<span class="text-muted small">공주님을 선택하시면 숙제 완료 여부를 실시간으로 추적하옵니다 👑</span>`;
                return;
            }

            try {
                // 👑 상디의 정석 마이그레이션 반영: 문자열 매핑 대신 member_id 외래키 고유 필터 수색 단행!
                const { data, error } = await _db
                    .from('reviews_ratings')
                    .select('review_text, rating_before')
                    .eq('round_no', globalTargetRound)
                    .eq('member_id', parseInt(targetId));

                if (error) throw error;

                // 평점 전 별점(rating_before)과 총평 텍스트가 모두 알차게 제출되었는지 정밀 감별
                const hasFinishedHomework = data && data.length > 0 && data[0].review_text && data[0].rating_before !== null;

                if (hasFinishedHomework) {
                    naggingZone.innerHTML = `
                        <div class="text-center py-1" style="color: #39FF14; font-weight:700;">
                            <i class="fa-solid fa-circle-check"></i> 이번 차수 숙제 완료! 역시 고결하셔요 💖
                        </div>
                    `;
                } else {
                    naggingZone.innerHTML = `
                        <div class="fw-bold mb-1" style="color: var(--neon-pink) !important; font-size:0.82rem; letter-spacing: 0.3px;">
                            ❌ 이번 차수 숙제 미완료 상태입니다!
                        </div>
                        <div class="text-muted" style="font-size:0.72rem; color:#b0b0b0 !important; line-height: 1.4;">
                            아직 토론 전 평점과 총평 레코드가 비어있사오니, 얼른 진입하셔서 우아하게 평점을 구워주셔요! 💅
                        </div>
                    `;
                }
            } catch (err) {
                console.error("1:1 숙제 스캔 장해:", err);
                naggingZone.innerHTML = `<span class="text-danger small">나의 숙제 상태 로드 실패</span>`;
            }
        }

        // 4자리 시그널 오토 서브밋 리팩토링
        async function handlePasswordAutoSubmit() {
            const memberId = document.getElementById("memberSelect").value;
            const selectedOption = document.getElementById("memberSelect").selectedOptions[0];
            const pwd = document.getElementById("passwordInput").value;
            const errZone = document.getElementById("errorMessageArea");

            if (!memberId) {
                if (pwd.length > 0) {
                    alert("공주님 이름부터 셀렉트 박스에서 고르셔요!");
                    document.getElementById("passwordInput").value = "";
                }
                return;
            }

            if (pwd.length === 4) {
                errZone.classList.add("d-none");
                try {
                    const memberName = selectedOption.getAttribute("data-name");
                    const memberImage = selectedOption.getAttribute("data-image");

                    // 👑 Golden Schema 매핑: id를 기준으로 패스워드 정밀 타격 대조
                    const { data, error } = await _db
                        .from('members')
                        .select('id, member_name, image_name, password')
                        .eq('id', parseInt(memberId))
                        .eq('password', pwd)
                        .eq('is_active', true);

                    if (error) throw error;

                    if (data && data.length > 0) {
                        // 👑 세션 창고에 고유 숫자 ID(`login_member_id`)를 1순위로 무조건 결속 적재!
                        localStorage.setItem("login_member_id", data[0].id);
                        localStorage.setItem("login_member", data[0].member_name);
                        localStorage.setItem("login_member_image", data[0].image_name || 'default_princess.png');
                        
                        // 화면 웰컴 아바타 상태로 즉시 가변 전환 및 개방
                        evaluateGateSessionUI();
                        await updateHomeworkDisplay();
                    } else {
                        errZone.textContent = "❌ 시크릿 시그널 암호가 올바르지 않사옵니다.";
                        errZone.classList.remove("d-none");
                        document.getElementById("passwordInput").value = "";
                        document.getElementById("passwordInput").focus();
                    }
                } catch (err) {
                    console.error(err);
                    errZone.textContent = "⚠️ 서버 통신 장애 발생.";
                    errZone.classList.remove("d-none");
                }
            }
        }
    </script>
</body>
</html>
