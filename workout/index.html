<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>BLACKPINK WORKOUT v2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bp-pink: rgb(232, 142, 163);
            --bp-black: #000;
            --bp-dark-gray: #121212;
            --neon-pink: #FF3F7E;
            --deep-purple: #5D3FD3;
            --text-dim: #888;
        }
        body { background-color: var(--bp-black); color: #fff; font-family: 'Pretendard', sans-serif; padding-bottom: 50px; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        .sticky-top-group { position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; padding: 15px; }
        .progress-mini-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--bp-pink); width: 0%; transition: width 0.3s ease; }
        
        .workout-card { background: var(--bp-dark-gray); border-radius: 24px; margin: 15px; border: 1px solid #252525; overflow: hidden; }
        .card-header { padding: 12px 20px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .set-row { padding: 12px 20px; border-bottom: 1px solid #222; position: relative; transition: 0.2s; }
        .set-row.saved-row { background: #0a0a0a; opacity: 0.7; }
        
        .history-badge { font-size: 0.62rem; color: var(--text-dim); background: #1a1a1a; padding: 3px 7px; border-radius: 5px; display: inline-block; margin-bottom: 6px; border-left: 3px solid var(--deep-purple); }
        
        .quick-add-area { margin: 30px 15px 15px 15px; padding: 20px; border: 1px dashed var(--bp-pink); border-radius: 24px; background: rgba(232, 142, 163, 0.02); }

        .form-select, .form-control { background-color: #121212 !important; border: 1.5px solid #252525 !important; color: #fff !important; border-radius: 12px; font-weight: 600; font-size: 0.85rem; }
        .btn-pink { background: var(--bp-pink); color: #000; border: none; border-radius: 14px; font-weight: 900; padding: 10px; }
        
        /* 버튼 상태별 스타일 */
        .btn-save { background: #222; color: #fff; border: none; border-radius: 10px; font-size: 0.72rem; width: 100%; height: 38px; font-weight: 800; transition: 0.2s; }
        .btn-save.st-saved { background: #1a1a1a; color: #555; border: 1px solid #333; }
        .btn-save.st-update { background: var(--bp-pink); color: #000; box-shadow: 0 0 10px rgba(232,142,163,0.3); }
        
        .border-chest { border-left: 5px solid #FF5E9B; }
        .border-back { border-left: 5px solid #FFBBDC; }
        .border-shoulder { border-left: 5px solid var(--neon-pink); }
        .border-leg { border-left: 5px solid var(--deep-purple); }
        .label-small { font-size: 0.65rem; color: #666; margin-bottom: 2px; display: block; font-weight: 700; }
        
        .swiping-left { transform: translateX(-50px); border-right: 5px solid var(--neon-pink) !important; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="text-center w-75">
            <h4 style="color:var(--bp-pink); font-weight:900; letter-spacing:3px; margin-bottom: 20px;">IDENTITY</h4>
            <input type="password" 
                   id="pw-input" 
                   class="form-control text-center mx-auto" 
                   style="max-width: 200px; font-size: 1.5rem; letter-spacing: 10px; background: #000 !important; border-color: #333 !important;"
                   maxlength="4" 
                   inputmode="numeric" 
                   pattern="[0-9]*"
                   autocomplete="one-time-code"
                   autofocus 
                   oninput="if(this.value.length===4) verify()">
            <div id="auth-msg" class="text-danger mt-3 small" style="font-weight: 800;"></div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="sticky-top-group">
            <div class="d-flex justify-content-between align-items-center">
                <select id="routine-select" class="form-select form-select-sm" style="width:145px;" onchange="handleRoutineChange(this.value)">
                    <option value="자유운동">자유운동</option>
                </select>
                <button class="finish-btn" style="background:var(--neon-pink); color:#fff; border:none; border-radius:12px; padding:6px 18px; font-weight:900; font-size:0.8rem;" onclick="finishDay()">운동 완료</button>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <span id="progress-text" style="font-size:0.7rem; font-weight:800; color:var(--bp-pink);">0 / 0 COMPLETED (0%)</span>
            </div>
            <div class="progress-mini-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <div id="workout-list-area"></div>

        <div class="quick-add-area">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span style="font-weight:900; font-size:0.9rem; color:var(--bp-pink);">+ QUICK ADD</span>
                <span id="quick-best" style="font-size:0.62rem; color:var(--text-dim); font-weight: 800;">BEST: -</span>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-4"><select id="quick-buwi" class="form-select form-select-sm" onchange="filterExercises(this.value)"></select></div>
                <div class="col-8"><select id="quick-ex" class="form-select form-select-sm" onchange="loadExerciseStats(this.value)"></select></div>
            </div>
            <div id="input-fields" class="row g-2 mb-3"></div>
            <button class="btn-pink w-100" id="btn-quick-add" onclick="addWorkoutFromQuick()">리스트 추가하기</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI';
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let EX_MASTER = [];
        let ACTIVE_SETS = [];
        let touchStartX = 0;

        window.onload = () => {
            const pwInput = document.getElementById('pw-input');
            if(pwInput) pwInput.focus();
        };

        async function verify() {
            const pwInput = document.getElementById('pw-input');
            const pw = pwInput.value;
            const msgArea = document.getElementById('auth-msg');
            
            msgArea.innerText = "VERIFYING..."; // 피드백 추가
            
            try {
                const { data } = await _db.from('settings').select('value').eq('code', 'ACCESS_PW').single();
                if(data?.value === pw) {
                    document.getElementById('auth-overlay').style.display='none';
                    document.getElementById('main-app').style.display='block';
                    init();
                } else {
                    msgArea.innerText = "WRONG PASSWORD";
                    pwInput.value = "";
                    pwInput.focus();
                }
            } catch(e) {
                msgArea.innerText = "CONNECTION ERROR";
            }
        }

        async function init() {
            const { data: exData } = await _db.schema('workout').from('exercises').select('*').order('name');
            EX_MASTER = exData || [];
            const { data: progData } = await _db.schema('workout').from('programs').select('program_name');
            const uniqueProgs = [...new Set(progData?.map(p => p.program_name))];
            const rSelect = document.getElementById('routine-select');
            uniqueProgs.forEach(p => rSelect.innerHTML += `<option value="${p}">${p}</option>`);
            const buwis = [...new Set(EX_MASTER.map(e => e.body_part))];
            const bSel = document.getElementById('quick-buwi');
            bSel.innerHTML = buwis.map(b => `<option value="${b}">${b}</option>`).join('');
            if(buwis.length > 0) filterExercises(buwis[0]);
            refreshActiveList();
        }

        function filterExercises(buwi) {
            const filtered = EX_MASTER.filter(e => e.body_part === buwi);
            const eSel = document.getElementById('quick-ex');
            eSel.innerHTML = filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            if(filtered.length > 0) loadExerciseStats(filtered[0].id);
        }

        async function loadExerciseStats(exId) {
            const ex = EX_MASTER.find(e => e.id === exId);
            const { data: logs } = await _db.schema('workout').from('logs').select('*').eq('exercise_id', exId).in('status', ['최종', 'FINAL']);
            let best = null;
            if(logs?.length > 0) {
                best = logs.reduce((p, c) => {
                    const pVal = (p.weight || p.workout_time || 0) * (p.reps || p.level || 0);
                    const cVal = (c.weight || c.workout_time || 0) * (c.reps || c.level || 0);
                    return pVal >= cVal ? p : c;
                });
                document.getElementById('quick-best').innerText = `BEST: ${best.weight || best.workout_time}${ex.unit} x ${best.reps || best.level}`;
            } else { document.getElementById('quick-best').innerText = "BEST: -"; }

            const inputArea = document.getElementById('input-fields');
            if(ex.unit === 'kg') {
                inputArea.innerHTML = `
                    <div class="col-4"><label class="label-small">세트</label><input type="number" id="q-sets" class="form-control" value="3"></div>
                    <div class="col-4"><label class="label-small">무게</label><input type="number" id="q-val1" class="form-control" value="${best?.weight || 20}"></div>
                    <div class="col-4"><label class="label-small">횟수</label><input type="number" id="q-val2" class="form-control" value="${best?.reps || 12}"></div>`;
            } else {
                inputArea.innerHTML = `
                    <div class="col-4"><label class="label-small">세트</label><input type="number" id="q-sets" class="form-control" value="1"></div>
                    <div class="col-4"><label class="label-small">시간(m)</label><input type="number" id="q-val1" class="form-control" value="${best?.workout_time || 20}"></div>
                    <div class="col-4"><label class="label-small">Level</label><input type="number" id="q-val2" class="form-control" value="${best?.level || 5}"></div>`;
            }
        }

        async function addWorkoutFromQuick() {
            const exId = document.getElementById('quick-ex').value;
            const ex = EX_MASTER.find(e => e.id === exId);
            const sets = parseInt(document.getElementById('q-sets').value);
            const v1 = document.getElementById('q-val1').value;
            const v2 = document.getElementById('q-val2').value;
            const newSets = [];
            for(let i=1; i<=sets; i++) {
                newSets.push({
                    exercise_id: exId, display_name: ex.name, body_part: ex.body_part, set_no: i, 
                    weight: ex.unit === 'kg' ? v1 : null, reps: ex.unit === 'kg' ? v2 : null,
                    workout_time: ex.unit === 'min' ? v1 : null, level: ex.unit === 'min' ? v2 : null,
                    status: 'TEMP', program_id: '자유운동', unit: ex.unit
                });
            }
            await _db.schema('workout').from('active_workout').insert(newSets);
            await refreshActiveList();
        }

        async function handleRoutineChange(progName) {
            if(ACTIVE_SETS.length > 0 && !confirm("진행 중인 운동을 초기화하고 루틴을 불러올까요?")) {
                document.getElementById('routine-select').value = ACTIVE_SETS[0]?.program_id || "자유운동";
                return;
            }
            await _db.schema('workout').from('active_workout').delete().neq('id', -1);
            if(progName === "자유운동") { await refreshActiveList(); return; }

            const { data: fullProg } = await _db.schema('workout').from('programs').select('week, day').eq('program_name', progName).order('week').order('day');
            const sessions = fullProg.reduce((acc, cur) => {
                if(!acc.find(s => s.week === cur.week && s.day === cur.day)) acc.push(cur);
                return acc;
            }, []);
            const { data: lastLog } = await _db.schema('workout').from('logs').select('week, day').eq('program_id', progName).eq('status', 'FINAL').order('workout_date', {ascending:false}).limit(1);
            let nextW = sessions[0].week, nextD = sessions[0].day;
            if(lastLog?.length > 0) {
                const idx = sessions.findIndex(s => s.week === lastLog[0].week && s.day === lastLog[0].day);
                if(idx !== -1 && idx < sessions.length - 1) { nextW = sessions[idx+1].week; nextD = sessions[idx+1].day; }
            }
            const { data: plan } = await _db.schema('workout').from('programs').select('*, exercises(name, body_part, unit)').eq('program_name', progName).eq('week', nextW).eq('day', nextD).order('order_no');
            const newLogs = plan.flatMap(p => Array.from({length: p.planned_sets}, (_, i) => ({
                exercise_id: p.exercise_id, display_name: p.exercises.name, body_part: p.body_part,
                set_no: i+1, weight: p.planned_weight, reps: p.planned_reps, status: 'TEMP', 
                program_id: progName, week: p.week, day: p.day, unit: p.exercises.unit
            })));
            await _db.schema('workout').from('active_workout').insert(newLogs);
            await refreshActiveList();
        }

        async function refreshActiveList() {
            const { data } = await _db.schema('workout').from('active_workout').select('*').order('id');
            ACTIVE_SETS = data || [];
            renderUI();
        }

        async function renderUI() {
            const container = document.getElementById('workout-list-area');
            container.innerHTML = '';
            let currentEx = '';
            let currentDiv = null;

            for(const set of ACTIVE_SETS) {
                if(set.display_name !== currentEx) {
                    currentEx = set.display_name;
                    currentDiv = document.createElement('div');
                    currentDiv.className = `workout-card border-${getPartKey(set.body_part)}`;
                    
                    const header = document.createElement('div');
                    header.className = 'card-header';
                    header.innerHTML = `<span class="fw-bold">${set.display_name}</span><small class="text-dim" style="font-size:0.6rem;">${set.body_part}</small>`;
                    header.ontouchstart = (e) => touchStartX = e.touches[0].clientX;
                    header.ontouchend = (e) => handleSwipe(e, () => deleteFullEx(set.exercise_id), header);
                    currentDiv.appendChild(header);
                    container.appendChild(currentDiv);
                }

                const hist = await getSetHistory(set.exercise_id, set.set_no);
                const isKg = (set.unit || 'kg') === 'kg';
                const isSaved = set.status === 'SAVED';

                const row = document.createElement('div');
                row.className = `set-row ${isSaved ? 'saved-row' : ''}`;
                row.ontouchstart = (e) => touchStartX = e.touches[0].clientX;
                row.ontouchend = (e) => handleSwipe(e, () => deleteSet(set.id, set.exercise_id), row);

                row.innerHTML = `
                    <div class="row align-items-center g-2">
                        <div class="col-2 text-center fw-bold" style="color:var(--bp-pink)">${set.set_no}S</div>
                        <div class="col-7">
                            <div class="history-badge">⏮ Last: ${hist}</div>
                            <div class="d-flex gap-1 mb-1">
                                <input type="number" id="v1-${set.id}" class="form-control form-control-sm text-center" value="${isKg ? (set.weight || '') : (set.workout_time || '')}" oninput="markChanged(${set.id}, '${set.status}')">
                                <input type="number" id="v2-${set.id}" class="form-control form-control-sm text-center" value="${isKg ? (set.reps || '') : (set.level || '')}" oninput="markChanged(${set.id}, '${set.status}')">
                            </div>
                            <input type="text" id="note-${set.id}" class="form-control form-control-sm" style="font-size:0.65rem; padding:4px 8px;" placeholder="Note..." value="${set.note || ''}" oninput="markChanged(${set.id}, '${set.status}')">
                        </div>
                        <div class="col-3">
                            <button id="btn-${set.id}" class="btn-save ${isSaved ? 'st-saved' : ''}" onclick="saveOneSet(${set.id})">
                                ${isSaved ? 'SAVED' : 'SAVE'}
                            </button>
                        </div>
                    </div>`;
                currentDiv.appendChild(row);
            }
            updateProgressBar();
        }

        // [운동3-a] 상태 변경 감지 로직
        function markChanged(id, currentStatus) {
            const btn = document.getElementById(`btn-${id}`);
            if(currentStatus === 'SAVED') {
                btn.innerText = "UPDATE";
                btn.className = "btn-save st-update";
            } else {
                btn.innerText = "SAVE";
                btn.className = "btn-save";
            }
        }

        async function saveOneSet(id) {
            const v1 = document.getElementById(`v1-${id}`).value;
            const v2 = document.getElementById(`v2-${id}`).value;
            const note = document.getElementById(`note-${id}`).value;
            const set = ACTIVE_SETS.find(s => s.id === id);
            
            const upData = { status: 'SAVED', note: note };
            if((set.unit || 'kg') === 'kg') { upData.weight = v1; upData.reps = v2; }
            else { upData.workout_time = v1; upData.level = v2; }

            await _db.schema('workout').from('active_workout').update(upData).eq('id', id);
            await refreshActiveList();
        }

        async function finishDay() {
            if(ACTIVE_SETS.length === 0) return;
            const unsaved = ACTIVE_SETS.filter(s => s.status === 'TEMP');
            if(unsaved.length > 0 && !confirm("저장되지 않은 세트가 있습니다. 포함하여 완료할까요?")) return;
            if(!confirm("오늘의 운동을 최종 완료하고 로그에 저장하시겠습니까?")) return;

            const finalData = ACTIVE_SETS.map(s => {
                const { id, created_at, status, ...rest } = s;
                // 완료 시점에 현재 입력값 반영
                const v1 = document.getElementById(`v1-${s.id}`).value;
                const v2 = document.getElementById(`v2-${s.id}`).value;
                const note = document.getElementById(`note-${s.id}`).value;
                if((s.unit || 'kg') === 'kg') { rest.weight = v1; rest.reps = v2; }
                else { rest.workout_time = v1; rest.level = v2; }
                return { ...rest, note: note, status: 'FINAL', workout_date: new Date().toISOString() };
            });

            const { error } = await _db.schema('workout').from('logs').insert(finalData);
            if(!error) {
                await _db.schema('workout').from('active_workout').delete().neq('id', -1);
                alert("오늘도 고생하셨습니다! 오운완! 🌸");
                location.reload();
            }
        }

        // 스와이프 및 헬퍼 함수들
        function handleSwipe(e, callback, el) {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (diff > 80) { el.classList.add('swiping-left'); setTimeout(() => { if(confirm("삭제할까요?")) callback(); else el.classList.remove('swiping-left'); }, 10); }
        }
        async function deleteSet(id, exId) { 
            await _db.schema('workout').from('active_workout').delete().eq('id', id); 
            const { data } = await _db.schema('workout').from('active_workout').select('id').eq('exercise_id', exId).order('id');
            for(let i=0; i<data.length; i++) await _db.schema('workout').from('active_workout').update({set_no: i+1}).eq('id', data[i].id);
            refreshActiveList(); 
        }
        async function deleteFullEx(exId) { await _db.schema('workout').from('active_workout').delete().eq('exercise_id', exId); refreshActiveList(); }
        async function getSetHistory(exId, setNo) {
            const { data } = await _db.schema('workout').from('logs').select('*').eq('exercise_id', exId).in('status', ['최종', 'FINAL']).order('workout_date', {ascending:false}).limit(20);
            if(!data?.length) return "-";
            const m = data.find(d => d.set_no === setNo) || data[0];
            return `${m.weight || m.workout_time} x ${m.reps || m.level}`;
        }
        function updateProgressBar() {
            const saved = ACTIVE_SETS.filter(s => s.status === 'SAVED').length;
            const pct = ACTIVE_SETS.length ? Math.round((saved/ACTIVE_SETS.length)*100) : 0;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').innerText = `${saved} / ${ACTIVE_SETS.length} COMPLETED (${pct}%)`;
        }
        function getPartKey(bp) {
            if(bp?.includes('가슴')) return 'chest'; if(bp?.includes('등')) return 'back';
            if(bp?.includes('어깨')) return 'shoulder'; if(bp?.includes('하체')) return 'leg';
            return 'etc';
        }
    </script>
</body>
</html>
