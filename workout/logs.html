<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>LOGS - WORKOUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: var(--bp-black); color: white;">
    <div class="container-app">
        <div class="mgmt-card" style="background: transparent; border: none; padding: 10px;">
            <h4 style="color:var(--bp-pink); font-weight:900;" class="mb-4">📅 LOG MANAGEMENT</h4>
            
            <div class="mb-4">
                <label class="label-small" style="color:#aaa;">날짜 선택</label>
                <input type="date" id="log-date-picker" class="form-control" 
                       style="background:#1e1e1e; border:1px solid #333; color:white; border-radius:12px;"
                       onchange="loadLogsByDate(this.value)">
            </div>

            <div id="log-list-container"></div>
        </div>

        <div class="nav-tabs-custom">
            <a href="workout.html" class="nav-item-custom">WORKOUT</a>
            <a href="manage.html" class="nav-item-custom">MANAGE</a>
            <a href="settings.html" class="nav-item-custom">SETTINGS</a>
            <a href="logs.html" class="nav-item-custom active">LOGS</a>
        </div>
    </div>

    <script src="supabase_config.js"></script>
    <script>
        checkAuth();
        let CURRENT_LOGS = [];
        let SETTINGS_MAP = {};
        let EXERCISE_MASTER = []; 
        let touchStartX = 0;

        async function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('log-date-picker').value = today;
            
            const { data: sData } = await _db.schema('workout').from('settings').select('*');
            sData.forEach(s => {
                if(!SETTINGS_MAP[s.category]) SETTINGS_MAP[s.category] = [];
                SETTINGS_MAP[s.category].push(s.name);
            });

            // v5.0.3 업데이트: 마스터의 상세 설정값까지 미리 가져옵니다.
            const { data: eData } = await _db.schema('workout').from('exercises')
                .select('id, name, body_part, exercise_type, weight_type, weight_unit')
                .order('name');
            EXERCISE_MASTER = eData || [];

            loadLogsByDate(today);
        }

        async function loadLogsByDate(date) {
            const container = document.getElementById('log-list-container');
            container.innerHTML = '<div class="text-center py-5" style="color:var(--bp-pink);">Loading...</div>';

            const { data, error } = await _db.schema('workout').from('logs').select('*')
                .gte('workout_date', `${date}T00:00:00`).lte('workout_date', `${date}T23:59:59`)
                .order('id', { ascending: true });

            if(error) return alert("로딩 실패: " + error.message);
            CURRENT_LOGS = data;
            renderLogCards();
        }

        function renderLogCards() {
            const container = document.getElementById('log-list-container');
            if (CURRENT_LOGS.length === 0) {
                container.innerHTML = '<div class="text-center text-secondary py-5">기록이 없습니다.</div>';
                return;
            }

            container.innerHTML = CURRENT_LOGS.map(log => `
                <div class="log-card" id="card-${log.id}" 
                    ontouchstart="handleTouchStart(event)" 
                    ontouchmove="handleTouchMove(event, ${log.id})" 
                    ontouchend="handleTouchEnd(event, ${log.id})">
                    <div class="swipe-delete-bg" id="delete-bg-${log.id}">DELETE 🗑️</div>
                    <div class="log-content" id="content-${log.id}" onclick="enterEditMode(${log.id})">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0 fw-bold" style="color:#fff;">
                                    ${log.display_name} <span class="badge-custom ms-1">${log.body_part}</span>
                                </h6>
                            </div>
                            <small class="text-neon font-mono fw-bold">${log.workout_date.split('T')[1].substring(0,5)}</small>
                        </div>
                        <div class="stats-box mt-3 mb-0 d-flex justify-content-around text-center" style="border-color: #222;">
                            <div><div class="edit-label">Value</div><b>${log.unit === 'kg' ? log.weight : log.workout_time}${log.unit}</b></div>
                            <div><div class="edit-label">Reps</div><b>${log.reps}회</b></div>
                            <div><div class="edit-label">Set</div><b>${log.set_no}세트</b></div>
                        </div>
                        ${log.note ? `<div class="mt-2 small text-secondary" style="font-style:italic; font-size:0.75rem;">"${log.note}"</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // v5.0.3 수정 모드: 마스터 설정 고정 및 로그 변수 수정
        function enterEditMode(id) {
            const log = CURRENT_LOGS.find(l => l.id === id);
            const exInfo = EXERCISE_MASTER.find(e => e.id === log.exercise_id);
            const card = document.getElementById(`content-${id}`);
            document.getElementById(`card-${id}`).classList.add('editing');

            card.onclick = null;
            card.innerHTML = `
                <div class="row g-2 text-start">
                    <div class="col-12">
                        <label class="label-mini">종목 선택</label>
                        <select id="edit-ex-id-${id}" class="edit-input" onchange="syncMasterInfo(${id})">
                            ${EXERCISE_MASTER.map(e => `<option value="${e.id}" ${e.id === log.exercise_id ? 'selected' : ''}>${e.name}</option>`).join('')}
                        </select>
                    </div>

                    <div class="col-6">
                        <label class="label-mini">운동 부위</label>
                        <div id="read-buwi-${id}" class="read-only-box">${exInfo.body_part}</div>
                    </div>
                    <div class="col-6">
                        <label class="label-mini">운동 타입</label>
                        <div id="read-type-${id}" class="read-only-box">${exInfo.exercise_type}</div>
                    </div>
                    <div class="col-6">
                        <label class="label-mini">무게 단위</label>
                        <div id="read-unit-${id}" class="read-only-box">${exInfo.weight_unit}</div>
                    </div>
                    <div class="col-6">
                        <label class="label-mini">무게 타입</label>
                        <div id="read-wtype-${id}" class="read-only-box">${exInfo.weight_type}</div>
                    </div>

                    <div class="col-4">
                        <label class="label-mini text-neon">${log.unit === 'kg' ? '무게' : '시간'}</label>
                        <input type="number" id="edit-val-${id}" class="edit-input" style="border-color:var(--neon-pink) !important;" value="${log.unit === 'kg' ? log.weight : log.workout_time}">
                    </div>
                    <div class="col-4">
                        <label class="label-mini">횟수</label>
                        <input type="number" id="edit-reps-${id}" class="edit-input" value="${log.reps}">
                    </div>
                    <div class="col-4">
                        <label class="label-mini">세트번호</label>
                        <input type="number" id="edit-set-no-${id}" class="edit-input" value="${log.set_no}">
                    </div>

                    <div class="col-6">
                        <label class="label-mini">기구</label>
                        <select id="edit-equip-${id}" class="edit-input">
                            <option value="기타">기타</option>
                            ${SETTINGS_MAP['EQUIPMENT'].map(v => `<option value="${v}" ${v===log.equipment_type?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="label-mini">그립/라잉</label>
                        <div class="d-flex gap-1">
                            <select id="edit-grip-${id}" class="edit-input">
                                <option value="기타">기타</option>
                                ${SETTINGS_MAP['GRIP'].map(v => `<option value="${v}" ${v===log.grip_type?'selected':''}>${v}</option>`).join('')}
                            </select>
                            <select id="edit-lying-${id}" class="edit-input">
                                <option value="기타">기타</option>
                                ${SETTINGS_MAP['LYING'].map(v => `<option value="${v}" ${v===log.lying_type?'selected':''}>${v}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="label-mini">메모</label>
                        <textarea id="edit-note-${id}" class="edit-input" rows="2" style="height:auto;">${log.note || ''}</textarea>
                    </div>

                    <div class="col-12 d-flex gap-2 mt-2">
                        <button class="btn-pink w-100" onclick="saveEdit(${id})">SAVE</button>
                        <button class="btn-cancel w-100" onclick="renderLogCards()">CANCEL</button>
                    </div>
                </div>
            `;
        }

        // 종목 변경 시 마스터 정보 텍스트 자동 갱신
        function syncMasterInfo(id) {
            const selectedExId = document.getElementById(`edit-ex-id-${id}`).value;
            const exInfo = EXERCISE_MASTER.find(e => e.id === selectedExId);
            if(exInfo) {
                document.getElementById(`read-buwi-${id}`).innerText = exInfo.body_part;
                document.getElementById(`read-type-${id}`).innerText = exInfo.exercise_type;
                document.getElementById(`read-unit-${id}`).innerText = exInfo.weight_unit;
                document.getElementById(`read-wtype-${id}`).innerText = exInfo.weight_type;
            }
        }

        async function saveEdit(id) {
            const log = CURRENT_LOGS.find(l => l.id === id);
            const selectedExId = document.getElementById(`edit-ex-id-${id}`).value;
            const exInfo = EXERCISE_MASTER.find(e => e.id === selectedExId);

            const updates = {
                exercise_id: selectedExId,
                display_name: exInfo.name,
                body_part: exInfo.body_part, // 마스터의 부위로 강제 동기화
                weight: log.unit === 'kg' ? document.getElementById(`edit-val-${id}`).value : 0,
                workout_time: log.unit === 'min' ? document.getElementById(`edit-val-${id}`).value : 0,
                reps: document.getElementById(`edit-reps-${id}`).value,
                set_no: document.getElementById(`edit-set-no-${id}`).value,
                equipment_type: document.getElementById(`edit-equip-${id}`).value,
                grip_type: document.getElementById(`edit-grip-${id}`).value,
                lying_type: document.getElementById(`edit-lying-${id}`).value,
                note: document.getElementById(`edit-note-${id}`).value
            };

            const { error } = await _db.schema('workout').from('logs').update(updates).eq('id', id);
            if(error) alert("수정 실패: " + error.message);
            else { loadLogsByDate(document.getElementById('log-date-picker').value); }
        }

        // 스와이프 기능 유지
        function handleTouchStart(e) { touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            const diffX = e.touches[0].clientX - touchStartX;
            if (diffX < 0) {
                document.getElementById(`content-${id}`).style.transform = `translateX(${Math.max(diffX, -100)}px)`;
                document.getElementById(`delete-bg-${id}`).style.right = '0';
            }
        }
        function handleTouchEnd(e, id) {
            const diffX = e.changedTouches[0].clientX - touchStartX;
            if (diffX < -150) { if(confirm("삭제하시겠습니까?")) deleteLog(id); else resetSwipe(id); } 
            else resetSwipe(id);
        }
        function resetSwipe(id) {
            document.getElementById(`content-${id}`).style.transform = 'translateX(0)';
            document.getElementById(`delete-bg-${id}`).style.right = '-100%';
        }
        async function deleteLog(id) {
            await _db.schema('workout').from('logs').delete().eq('id', id);
            loadLogsByDate(document.getElementById('log-date-picker').value);
        }

        init();
    </script>
</body>
</html>
