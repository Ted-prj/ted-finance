<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>LOGS - WORKOUT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .log-card {
            background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 12px;
            position: relative; overflow: hidden; transition: transform 0.2s;
            border-left: 5px solid var(--bp-pink);
        }
        .log-card.editing { border-left-color: #ffc107; background: #2a2a2a; }
        .swipe-delete-bg {
            position: absolute; left: -100%; top: 0; width: 100%; height: 100%;
            background: #dc3545; display: flex; align-items: center; padding-left: 20px;
            color: white; font-weight: bold; z-index: 1; transition: left 0.3s;
        }
        .log-content { position: relative; z-index: 2; background: inherit; }
        .edit-input { background: #333; border: 1px solid #444; color: white; border-radius: 4px; padding: 2px 5px; width: 100%; }
        .label-mini { font-size: 0.7rem; color: #888; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="container-app">
        <div class="mgmt-card">
            <h5 style="color:var(--bp-pink); font-weight:900;" class="mb-3">📅 운동 로그 관리</h5>
            
            <div class="mb-4">
                <label class="label-small">날짜 선택</label>
                <input type="date" id="log-date-picker" class="form-control" onchange="loadLogsByDate(this.value)">
            </div>

            <div id="log-list-container">
                <div class="text-center text-secondary py-5">날짜를 선택하여 운동 기록을 확인하세요.</div>
            </div>
        </div>

        <div class="nav-tabs-custom">
            <a href="workout.html" class="nav-item-custom">WORKOUT</a>
            <a href="manage.html" class="nav-item-custom">MANAGE</a>
            <a href="settings.html" class="nav-item-custom">SETTINGS</a>
            <a href="logs.html" class="nav-item-custom active">LOGS</a>
        </div>
    </div>

    <script src="supabase_config.js"></script>
    <script>
        checkAuth();
        let CURRENT_LOGS = [];
        let SETTINGS_MAP = {};

        async function init() {
            // 오늘 날짜로 초기 세팅
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('log-date-picker').value = today;
            
            // 수정 모드용 세팅 데이터 로드
            const { data } = await _db.schema('workout').from('settings').select('*');
            data.forEach(s => {
                if(!SETTINGS_MAP[s.category]) SETTINGS_MAP[s.category] = [];
                SETTINGS_MAP[s.category].push(s.name);
            });

            loadLogsByDate(today);
        }

        async function loadLogsByDate(date) {
            const container = document.getElementById('log-list-container');
            container.innerHTML = '<div class="text-center py-5">기록 불러오는 중...</div>';

            const { data, error } = await _db.schema('workout')
                .from('logs')
                .select('*')
                .gte('workout_date', `${date}T00:00:00`)
                .lte('workout_date', `${date}T23:59:59`)
                .order('workout_date', { ascending: true });

            if(error) return alert("로딩 실패: " + error.message);
            
            CURRENT_LOGS = data;
            renderLogCards();
        }

        function renderLogCards() {
            const container = document.getElementById('log-list-container');
            if(CURRENT_LOGS.length === 0) {
                container.innerHTML = '<div class="text-center text-secondary py-5">해당 날짜에 운동 기록이 없습니다.</div>';
                return;
            }

            container.innerHTML = CURRENT_LOGS.map(log => `
                <div class="log-card" id="card-${log.id}" 
                     touchstart="handleTouchStart(event, ${log.id})" 
                     touchmove="handleTouchMove(event, ${log.id})" 
                     touchend="handleTouchEnd(event, ${log.id})">
                    <div class="swipe-delete-bg" id="delete-bg-${log.id}">삭제 진행중...</div>
                    <div class="log-content" id="content-${log.id}" onclick="enterEditMode(${log.id})">
                        <div class="d-flex justify-content-between">
                            <span style="color:var(--bp-pink); font-weight:bold;">${log.display_name}</span>
                            <small class="text-secondary">${log.workout_date.split('T')[1].substring(0,5)}</small>
                        </div>
                        <div class="mt-2 row g-2">
                            <div class="col-4">
                                <div class="label-mini">무게/시간</div>
                                <span>${log.unit === 'kg' ? log.weight : log.workout_time}${log.unit}</span>
                            </div>
                            <div class="col-4">
                                <div class="label-mini">횟수/세트</div>
                                <span>${log.reps}회 / ${log.set_no}세트</span>
                            </div>
                            <div class="col-4">
                                <div class="label-mini">부위</div>
                                <span class="badge bg-dark border border-secondary">${log.body_part}</span>
                            </div>
                        </div>
                        ${log.note ? `<div class="mt-2 text-info small">📝 ${log.note}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 탭4.b 수정 모드 변경
        function enterEditMode(id) {
            const log = CURRENT_LOGS.find(l => l.id === id);
            const card = document.getElementById(`content-${id}`);
            document.getElementById(`card-${id}`).classList.add('editing');

            card.onclick = null; // 클릭 이벤트 중지
            card.innerHTML = `
                <div class="row g-2">
                    <div class="col-6">
                        <label class="label-mini">${log.unit === 'kg' ? '무게' : '시간'}</label>
                        <input type="number" id="edit-val-${id}" class="edit-input" value="${log.unit === 'kg' ? log.weight : log.workout_time}">
                    </div>
                    <div class="col-6">
                        <label class="label-mini">횟수</label>
                        <input type="number" id="edit-reps-${id}" class="edit-input" value="${log.reps}">
                    </div>
                    <div class="col-6">
                        <label class="label-mini">기구</label>
                        <select id="edit-equip-${id}" class="edit-input">
                            ${SETTINGS_MAP['EQUIPMENT'].map(v => `<option value="${v}" ${v===log.equipment_type?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="label-mini">그립</label>
                        <select id="edit-grip-${id}" class="edit-input">
                            ${SETTINGS_MAP['GRIP'].map(v => `<option value="${v}" ${v===log.grip_type?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-12 mt-2">
                        <textarea id="edit-note-${id}" class="edit-input" rows="2">${log.note || ''}</textarea>
                    </div>
                    <div class="col-12 d-flex gap-2 mt-2">
                        <button class="btn btn-sm btn-pink w-100" onclick="saveEdit(${id})">저장</button>
                        <button class="btn btn-sm btn-outline-light w-100" onclick="renderLogCards()">취소</button>
                    </div>
                </div>
            `;
        }

        async function saveEdit(id) {
            const log = CURRENT_LOGS.find(l => l.id === id);
            const updates = {
                weight: log.unit === 'kg' ? document.getElementById(`edit-val-${id}`).value : 0,
                workout_time: log.unit === 'min' ? document.getElementById(`edit-val-${id}`).value : 0,
                reps: document.getElementById(`edit-reps-${id}`).value,
                equipment_type: document.getElementById(`edit-equip-${id}`).value,
                grip_type: document.getElementById(`edit-grip-${id}`).value,
                note: document.getElementById(`edit-note-${id}`).value
            };

            const { error } = await _db.schema('workout').from('logs').update(updates).eq('id', id);
            if(error) alert("수정 실패: " + error.message);
            else {
                alert("수정되었습니다.");
                loadLogsByDate(document.getElementById('log-date-picker').value);
            }
        }

        // 탭4.b 오른쪽 스와이프 삭제 로직
        let touchStartX = 0;
        function handleTouchStart(e, id) { touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            const moveX = e.touches[0].clientX - touchStartX;
            if (moveX > 50) { // 오른쪽으로 50px 이상 스와이프 시 시각적 피드백
                document.getElementById(`delete-bg-${id}`).style.left = '0';
            }
        }
        function handleTouchEnd(e, id) {
            const moveX = e.changedTouches[0].clientX - touchStartX;
            if (moveX > 150) { // 150px 이상 스와이프 시 삭제 실행
                if(confirm("이 운동 로그를 삭제할까요?")) deleteLog(id);
                else document.getElementById(`delete-bg-${id}`).style.left = '-100%';
            } else {
                document.getElementById(`delete-bg-${id}`).style.left = '-100%';
            }
        }

        async function deleteLog(id) {
            const { error } = await _db.schema('workout').from('logs').delete().eq('id', id);
            if(error) alert("삭제 실패: " + error.message);
            else loadLogsByDate(document.getElementById('log-date-picker').value);
        }

        init();
    </script>
</body>
</html>
