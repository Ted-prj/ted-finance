<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>BLACKPINK WORKOUT v3.4.6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bp-pink: rgb(232, 142, 163);
            --bp-black: #000;
            --bp-dark-gray: #121212;
            --neon-pink: #FF3F7E;
            --deep-purple: #5D3FD3;
            --text-dim: #888;
        }
        body { background-color: var(--bp-black); color: #fff; font-family: 'Pretendard', sans-serif; padding-bottom: 50px; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .container-app { max-width: 800px; margin: 0 auto; }
        .sticky-top-group { position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; padding: 15px; }
        .progress-mini-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--bp-pink); width: 0%; transition: width 0.3s ease; }
        #session-input-area { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .workout-card { background: var(--bp-dark-gray); border-radius: 24px; margin: 15px; border: 1px solid #252525; overflow: hidden; }
        .card-header { padding: 12px 20px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); touch-action: pan-y; }
        .set-row { padding: 12px 20px; border-bottom: 1px solid #222; position: relative; transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); background: var(--bp-dark-gray); touch-action: pan-y; }
        .set-row.saved-row { background: #0a0a0a; opacity: 0.7; }
        .swiping-left { transform: translateX(-80px); }
        .history-badge { font-size: 0.62rem; color: var(--text-dim); background: #1a1a1a; padding: 3px 7px; border-radius: 5px; display: inline-block; margin-bottom: 6px; border-left: 3px solid var(--deep-purple); }
        .quick-add-area { margin: 30px 15px 15px 15px; padding: 20px; border: 1px dashed var(--bp-pink); border-radius: 24px; background: rgba(232, 142, 163, 0.02); }
        .form-control, .form-select { background-color: #080808 !important; border: 1.5px solid #252525 !important; color: #fff !important; border-radius: 12px; font-weight: 600; font-size: 0.85rem; }
        .btn-pink { background: var(--bp-pink); color: #000; border: none; border-radius: 14px; font-weight: 900; padding: 10px; }
        .btn-save { background: #222; color: #fff; border: none; border-radius: 10px; font-size: 0.72rem; width: 100%; height: 38px; font-weight: 800; transition: 0.2s; }
        .btn-save.st-saved { background: #1a1a1a; color: #555; border: 1px solid #333; }
        .btn-save.st-update { background: var(--bp-pink); color: #000; }
        .border-chest { border-left: 5px solid #FF5E9B; }
        .border-back { border-left: 5px solid #FFBBDC; }
        .border-shoulder { border-left: 5px solid var(--neon-pink); }
        .border-leg { border-left: 5px solid var(--deep-purple); }
        .label-small { font-size: 0.65rem; color: #666; margin-bottom: 2px; display: block; font-weight: 700; }
        .best-info-box { line-height: 1.3; margin-left: 10px; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="text-center w-75">
            <h4 style="color:var(--bp-pink); font-weight:900; letter-spacing:3px; margin-bottom: 20px;">IDENTITY</h4>
            <input type="password" id="pw-input" class="form-control text-center mx-auto" style="max-width: 200px; font-size: 1.5rem; letter-spacing: 10px; background: #000 !important; border-color: #333 !important;" maxlength="4" inputmode="numeric" oninput="if(this.value.length===4) verify()">
            <div id="auth-msg" class="text-danger mt-3 small" style="font-weight: 800;"></div>
        </div>
    </div>

    <div id="main-app" class="container-app" style="display:none;">
        <div class="sticky-top-group">
            <div class="d-flex justify-content-between align-items-center">
                <select id="routine-select" class="form-select form-select-sm" style="width:145px;" onchange="handleRoutineChange(this.value)">
                    <option value="자유운동">자유운동</option>
                </select>
                <button type="button" style="background:var(--neon-pink); color:#fff; border:none; border-radius:12px; padding:6px 18px; font-weight:900; font-size:0.8rem;" onclick="toggleFinishArea()">운동 완료</button>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <span id="progress-text" style="font-size:0.7rem; font-weight:800; color:var(--bp-pink);">0 / 0 SAVED (0%)</span>
            </div>
            <div class="progress-mini-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <div id="session-input-area">
                <div class="row g-2 mb-2">
                    <div class="col-4"><label class="label-small">시간(분)</label><input type="number" id="s-duration" class="form-control form-control-sm" placeholder="60"></div>
                    <div class="col-4"><label class="label-small">활동kcal</label><input type="number" id="s-active-cal" class="form-control form-control-sm" placeholder="300"></div>
                    <div class="col-4"><label class="label-small">총kcal</label><input type="number" id="s-total-cal" class="form-control form-control-sm" placeholder="400"></div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="label-small">평균 심박</label><input type="number" id="s-avg-hr" class="form-control form-control-sm" placeholder="130"></div>
                    <div class="col-4"><label class="label-small">최소 심박</label><input type="number" id="s-min-hr" class="form-control form-control-sm" placeholder="80"></div>
                    <div class="col-4"><label class="label-small">최대 심박</label><input type="number" id="s-max-hr" class="form-control form-control-sm" placeholder="160"></div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary flex-fill" style="border-radius:10px; font-size:0.75rem; color: #888;" onclick="toggleFinishArea()">취소</button>
                    <button class="btn btn-sm btn-pink flex-fill" style="font-size:0.75rem;" onclick="processFinalSave()">최종 로그 저장 & 리셋</button>
                </div>
            </div>
        </div>

        <div id="workout-list-area"></div>

        <div class="quick-add-area">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span style="font-weight:900; font-size:0.9rem; color:var(--bp-pink);">+ QUICK ADD</span>
                <div class="text-end best-info-box">
                    <div id="quick-best" style="font-size:0.62rem; color:#fff; font-weight: 900;">BEST: -</div>
                    <div id="quick-best-date" style="font-size:0.52rem; color:var(--text-dim); font-weight: 700;"></div>
                    <div id="quick-best-note" style="font-size:0.55rem; color:var(--bp-pink); font-weight: 500; font-style: italic; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
                </div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-4"><select id="quick-buwi" class="form-select form-select-sm" onchange="filterExercises(this.value)"></select></div>
                <div class="col-8"><select id="quick-ex" class="form-select form-select-sm" onchange="loadExerciseStats(this.value)"></select></div>
            </div>
            <div id="input-fields" class="row g-2 mb-3"></div>
            <button type="button" class="btn-pink w-100" id="btn-quick-add" onclick="addWorkoutFromQuick()">리스트 추가하기</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vaamifqzjsrflmprihgv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYW1pZnF6anNyZmxtcHJpaGd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODc2NzksImV4cCI6MjA5MTk2MzY3OX0.qUUs3aoWQMEVjTQkYTZtA8CMjMF_MrgBFa4UfiiEWzI';
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let EX_MASTER = [];
        let ACTIVE_SETS = [];
        let touchStartX = 0;

        window.onload = () => { document.getElementById('pw-input').focus(); };

        async function verify() {
            const pw = document.getElementById('pw-input').value;
            const { data } = await _db.from('settings').select('value').eq('code', 'ACCESS_PW').single();
            if(data?.value === pw) {
                document.getElementById('auth-overlay').style.display='none';
                document.getElementById('main-app').style.display='block';
                await init();
            } else { document.getElementById('auth-msg').innerText = "WRONG PASSWORD"; document.getElementById('pw-input').value = ""; }
        }

        async function init() {
            const { data: exData } = await _db.schema('workout').from('exercises').select('*').order('name');
            EX_MASTER = exData || [];
            const { data: progData } = await _db.schema('workout').from('programs').select('program_name');
            const uniqueProgs = [...new Set(progData?.map(p => p.program_name))];
            const rSelect = document.getElementById('routine-select');
            uniqueProgs.forEach(p => rSelect.innerHTML += `<option value="${p}">${p}</option>`);
            const buwis = [...new Set(EX_MASTER.map(e => e.body_part))];
            const bSel = document.getElementById('quick-buwi');
            bSel.innerHTML = buwis.map(b => `<option value="${b}">${b}</option>`).join('');
            if(buwis.length > 0) filterExercises(buwis[0]);
            await refreshActiveList();
        }

        function filterExercises(buwi) {
            const filtered = EX_MASTER.filter(e => e.body_part === buwi);
            const eSel = document.getElementById('quick-ex');
            eSel.innerHTML = filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            if(filtered.length > 0) loadExerciseStats(filtered[0].id);
        }

        async function loadExerciseStats(exId) {
            const ex = EX_MASTER.find(e => e.id === exId);
            const { data: logs } = await _db.schema('workout').from('logs').select('*').eq('exercise_id', exId).eq('status', 'FINAL').order('workout_date', { ascending: false }).limit(20);
            let best = null;
            const bDateEl = document.getElementById('quick-best-date');
            const bNoteEl = document.getElementById('quick-best-note');
            if(logs?.length > 0) {
                best = logs.reduce((p, c) => {
                    const pV = (Number(p.weight||0)||Number(p.workout_time||0)) * (Number(p.reps||0)||Number(p.level||0));
                    const cV = (Number(c.weight||0)||Number(c.workout_time||0)) * (Number(c.reps||0)||Number(c.level||0));
                    return cV > pV ? c : p;
                });
                document.getElementById('quick-best').innerHTML = `<span style="color:var(--bp-pink)">BEST:</span> ${best.weight || best.workout_time}${ex.unit} x ${best.reps || best.level}`;
                if(best.workout_date) { const d = new Date(best.workout_date); bDateEl.innerText = `📅 ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
                bNoteEl.innerText = best.note ? `💬 ${best.note}` : "";
            } else { document.getElementById('quick-best').innerText = "BEST: -"; bDateEl.innerText = ""; bNoteEl.innerText = ""; }
            const inputArea = document.getElementById('input-fields');
            if(ex.unit === 'kg') {
                inputArea.innerHTML = `<div class="col-4"><label class="label-small">세트</label><input type="number" id="q-sets" class="form-control" value="3"></div><div class="col-4"><label class="label-small">무게</label><input type="number" id="q-val1" class="form-control" value="${best?.weight || 20}"></div><div class="col-4"><label class="label-small">횟수</label><input type="number" id="q-val2" class="form-control" value="${best?.reps || 12}"></div>`;
            } else {
                inputArea.innerHTML = `<div class="col-4"><label class="label-small">세트</label><input type="number" id="q-sets" class="form-control" value="1"></div><div class="col-4"><label class="label-small">시간(m)</label><input type="number" id="q-val1" class="form-control" value="${best?.workout_time || 20}"></div><div class="col-4"><label class="label-small">Level</label><input type="number" id="q-val2" class="form-control" value="${best?.level || 5}"></div>`;
            }
        }

        async function addWorkoutFromQuick() {
            const exId = document.getElementById('quick-ex').value;
            const ex = EX_MASTER.find(e => e.id === exId);
            const sets = parseInt(document.getElementById('q-sets').value) || 1;
            const v1 = Number(document.getElementById('q-val1').value) || 0;
            const v2 = Number(document.getElementById('q-val2').value) || 0;
            const newSets = [];
            for(let i=1; i<=sets; i++) {
                newSets.push({
                    exercise_id: exId, display_name: ex.name, body_part: ex.body_part, set_no: i, 
                    status: 'TEMP', program_id: '자유운동', unit: ex.unit || 'kg',
                    weight: ex.unit === 'kg' ? v1 : 0, reps: ex.unit === 'kg' ? v2 : 0,
                    workout_time: ex.unit === 'min' ? v1 : 0, level: ex.unit === 'min' ? v2 : 0
                });
            }
            await _db.schema('workout').from('active_workout').insert(newSets);
            await refreshActiveList();
        }

        async function handleRoutineChange(progName) {
            if(ACTIVE_SETS.length > 0 && !confirm("현재 진행 중인 리스트를 초기화할까요?")) {
                document.getElementById('routine-select').value = "자유운동";
                return;
            }
            await _db.schema('workout').from('active_workout').delete().neq('id', -1);
            if(progName === "자유운동") { await refreshActiveList(); return; }
            const { data: plan } = await _db.schema('workout').from('programs').select('*, exercises(name, body_part, unit)').eq('program_name', progName).order('order_no');
            const newLogs = plan.flatMap(p => Array.from({length: p.planned_sets}, (_, i) => ({
                exercise_id: p.exercise_id, display_name: p.exercises.name, body_part: p.body_part,
                set_no: i+1, weight: p.exercises.unit === 'kg' ? p.planned_weight : 0, reps: p.exercises.unit === 'kg' ? p.planned_reps : 0,
                workout_time: p.exercises.unit === 'min' ? p.planned_weight : 0, level: p.exercises.unit === 'min' ? p.planned_reps : 0,
                status: 'TEMP', program_id: progName, unit: p.exercises.unit || 'kg'
            })));
            await _db.schema('workout').from('active_workout').insert(newLogs);
            await refreshActiveList();
        }

        async function refreshActiveList() {
            const { data } = await _db.schema('workout').from('active_workout').select('*').order('id');
            ACTIVE_SETS = data || [];
            renderUI();
        }

        async function renderUI() {
            const container = document.getElementById('workout-list-area');
            container.innerHTML = '';
            let currentEx = '';
            let currentDiv = null;

            for(const set of ACTIVE_SETS) {
                if(set.display_name !== currentEx) {
                    currentEx = set.display_name;
                    currentDiv = document.createElement('div');
                    currentDiv.className = `workout-card border-${getPartKey(set.body_part)}`;
                    const header = document.createElement('div');
                    header.className = 'card-header';
                    header.innerHTML = `<span class="fw-bold">${set.display_name}</span><small class="text-dim">${set.body_part}</small>`;
                    header.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
                    header.addEventListener('touchend', (e) => {
                        const diff = touchStartX - e.changedTouches[0].clientX;
                        if (diff > 80) {
                            header.classList.add('swiping-left');
                            setTimeout(async () => {
                                if(confirm(`[${set.display_name}] 종목의 모든 세트를 삭제할까요?`)) { await deleteExerciseGroup(set.display_name); } 
                                else { header.classList.remove('swiping-left'); }
                            }, 100);
                        }
                    }, {passive: true});
                    currentDiv.appendChild(header);
                    container.appendChild(currentDiv);
                }
                const isSaved = set.status === 'SAVED';
                const hist = await getSetHistory(set.exercise_id, set.set_no);
                const row = document.createElement('div');
                row.className = `set-row ${isSaved ? 'saved-row' : ''}`;
                row.id = `row-${set.id}`;
                row.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
                row.addEventListener('touchend', (e) => {
                    const diff = touchStartX - e.changedTouches[0].clientX;
                    if (diff > 80) {
                        row.classList.add('swiping-left');
                        setTimeout(async () => {
                            if(confirm("이 세트를 삭제할까요?")) { await deleteOneSet(set.id, set.display_name); } 
                            else { row.classList.remove('swiping-left'); }
                        }, 100);
                    }
                }, {passive: true});

                row.innerHTML = `
                    <div class="row align-items-center g-2">
                        <div class="col-2 text-center fw-bold" style="color:var(--bp-pink)">${set.set_no}S</div>
                        <div class="col-7">
                            <div class="history-badge">⏮ Last: ${hist}</div>
                            <div class="d-flex gap-1 mb-1">
                                <input type="number" id="v1-${set.id}" class="form-control form-control-sm text-center" value="${set.unit==='kg' ? (set.weight||'') : (set.workout_time||'')}">
                                <input type="number" id="v2-${set.id}" class="form-control form-control-sm text-center" value="${set.unit==='kg' ? (set.reps||'') : (set.level||'')}">
                            </div>
                            <input type="text" id="note-${set.id}" class="form-control form-control-sm" style="font-size:0.65rem;" placeholder="Note..." value="${set.note || ''}">
                        </div>
                        <div class="col-3"><button id="btn-${set.id}" class="btn-save ${isSaved ? 'st-saved' : ''}" onclick="saveOneSet(${set.id})">${isSaved ? 'SAVED' : 'SAVE'}</button></div>
                    </div>`;
                currentDiv.appendChild(row);
            }
            updateProgressBar();
        }

        async function getSetHistory(exId, setNo) { 
            const { data } = await _db.schema('workout').from('logs').select('*').eq('exercise_id', exId).eq('status', 'FINAL').order('workout_date', {ascending:false}).limit(20); 
            if(!data?.length) return "-"; 
            const m = data.find(d => d.set_no === setNo) || data[0]; 
            return `${m.weight || m.workout_time} x ${m.reps || m.level}`; 
        }

        async function saveOneSet(id) {
            const v1 = Number(document.getElementById(`v1-${id}`).value);
            const v2 = Number(document.getElementById(`v2-${id}`).value);
            const note = document.getElementById(`note-${id}`).value;
            const set = ACTIVE_SETS.find(s => s.id === id);
            const upData = { status: 'SAVED', note: note };
            if(set.unit === 'kg') { upData.weight = v1; upData.reps = v2; } else { upData.workout_time = v1; upData.level = v2; }
            await _db.schema('workout').from('active_workout').update(upData).eq('id', id);
            await refreshActiveList();
        }

        async function deleteOneSet(id, displayName) {
            const { error: delError } = await _db.schema('workout').from('active_workout').delete().eq('id', id);
            if(delError) return alert("삭제 실패: " + delError.message);
            const { data: remaining } = await _db.schema('workout').from('active_workout').select('id').eq('display_name', displayName).order('id', { ascending: true });
            if(remaining && remaining.length > 0) {
                for(let i=0; i<remaining.length; i++) {
                    await _db.schema('workout').from('active_workout').update({ set_no: i + 1 }).eq('id', remaining[i].id);
                }
            }
            await refreshActiveList();
        }

        async function deleteExerciseGroup(displayName) {
            const { error } = await _db.schema('workout').from('active_workout').delete().eq('display_name', displayName);
            if(error) alert("삭제 실패: " + error.message);
            else await refreshActiveList();
        }

        function updateProgressBar() {
            const saved = ACTIVE_SETS.filter(s => s.status === 'SAVED').length;
            const pct = ACTIVE_SETS.length ? Math.round((saved/ACTIVE_SETS.length)*100) : 0;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').innerText = `${saved} / ${ACTIVE_SETS.length} SAVED (${pct}%)`;
        }

        function toggleFinishArea() {
            const area = document.getElementById('session-input-area');
            const isVisible = area.style.display === 'block';
            area.style.display = isVisible ? 'none' : 'block';
            if(!isVisible) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // [Fix] 날짜 및 타임스탬프 계산 함수 (새벽 6시 로직 포함)
        function getSmartWorkoutDate() {
            const now = new Date();
            const hours = now.getHours();
            let targetDate = new Date(now);

            // 자정(0시) 이후 ~ 새벽 6시 이전일 경우 확인 팝업
            if (hours >= 0 && hours < 6) {
                const yesterday = new Date(now);
                yesterday.setDate(now.getDate() - 1);
                const yStr = yesterday.toISOString().split('T')[0];
                const tStr = now.toISOString().split('T')[0];
                
                const useYesterday = confirm(`현재 새벽 시간입니다.\n운동 날짜를 [어제(${yStr})]로 기록할까요?\n(취소 클릭 시 오늘(${tStr})로 기록됩니다.)`);
                if (useYesterday) {
                    targetDate = yesterday;
                }
            }
            
            return {
                dbTimestamp: targetDate.toISOString(), // Timestamptz용 ISO 문자열
                idDateStr: targetDate.getFullYear() + String(targetDate.getMonth() + 1).padStart(2, '0') + String(targetDate.getDate()).padStart(2, '0'),
                justDate: targetDate.toISOString().split('T')[0]
            };
        }

        async function processFinalSave() {
            const savedSets = ACTIVE_SETS.filter(s => s.status === 'SAVED');
            const tempSets = ACTIVE_SETS.filter(s => s.status === 'TEMP');
            if(tempSets.length > 0) return alert(`저장되지 않은 세트가 ${tempSets.length}개 있습니다. 모두 SAVE 해주세요.`);
            if(savedSets.length === 0) return alert("저장된 운동이 없습니다.");

            const duration = document.getElementById('s-duration').value || "0";
            
            // [Fix] 스마트 날짜 결정
            const smartDate = getSmartWorkoutDate();
            const dateStr = smartDate.idDateStr;

            try {
                const { data: existingSessions } = await _db.schema('workout').from('session_logs').select('id').like('id', `${dateStr}_%`);
                const sessionCount = (existingSessions?.length || 0) + 1;
                const hasWeight = savedSets.some(s => s.unit === 'kg');
                const hasCardio = savedSets.some(s => s.unit === 'min');
                let typeCode = (hasWeight && hasCardio) ? "M" : (hasWeight ? "W" : "C");
                const customSessionId = `${dateStr}_${typeCode}_S${sessionCount}`;

                const { error: sErr } = await _db.schema('workout').from('session_logs').insert([{
                    id: customSessionId, duration_min: parseInt(duration),
                    active_calories: parseFloat(document.getElementById('s-active-cal').value || 0),
                    total_calories: parseFloat(document.getElementById('s-total-cal').value || 0),
                    avg_heart_rate: parseInt(document.getElementById('s-avg-hr').value || 0),
                    min_heart_rate: parseInt(document.getElementById('s-min-hr').value || 0),
                    max_heart_rate: parseInt(document.getElementById('s-max-hr').value || 0),
                    workout_date: smartDate.justDate
                }]);
                if(sErr) throw sErr;

                const logs = savedSets.map(s => ({
                    exercise_id: s.exercise_id, display_name: s.display_name, body_part: s.body_part,
                    set_no: s.set_no, weight: s.weight, reps: s.reps, workout_time: s.workout_time,
                    level: s.level, unit: s.unit, note: s.note, program_id: s.program_id,
                    week: s.week, day: s.day, status: 'FINAL', session_id: customSessionId,
                    workout_date: smartDate.dbTimestamp // 한국 시간 기준 반영된 ISO String
                }));

                const { error: lErr } = await _db.schema('workout').from('logs').insert(logs);
                if(lErr) throw lErr;

                await _db.schema('workout').from('active_workout').delete().neq('id', -1);
                alert(`운동 세션 [${customSessionId}] 저장 성공! 🔥`);
                location.reload();
            } catch(e) { alert("저장 실패: " + e.message); }
        }

        function getPartKey(bp) { if(bp?.includes('가슴')) return 'chest'; if(bp?.includes('등')) return 'back'; if(bp?.includes('어깨')) return 'shoulder'; if(bp?.includes('하체')) return 'leg'; return 'etc'; }
    </script>
</body>
</html>
